async function bcConfirm(){
  const checks = Array.from(document.querySelectorAll('.bcItem')).filter(c=>c.checked);
  if(checks.length===0) return toast('কমপক্ষে একটি লেনদেন নির্বাচন করুন','err');
  const bankName = document.getElementById('bcBank').value.trim();
  if(!bankName) return toast('ব্যাংকের নাম দিন','err');
  const accountNo = document.getElementById('bcAcc').value.trim();
  const date = document.getElementById('bcDate').value || today();
  const note = document.getElementById('bcNote').value.trim();
  const pending = window._bcPending || [];
  const selected = checks.map(c=>pending[+c.dataset.i]).filter(Boolean);
  const total = selected.reduce((s,x)=>s+x.amount,0);
  const summaryHtml = `<div class="cm-summary">
    <div class="cm-row"><span class="lbl">🏦 ব্যাংক</span><span class="val">${esc(bankName)}</span></div>
    ${accountNo?`<div class="cm-row"><span class="lbl">💳 অ্যাকাউন্ট</span><span class="val">${esc(accountNo)}</span></div>`:''}
    <div class="cm-row"><span class="lbl">📅 তারিখ</span><span class="val">${esc(date)}</span></div>
    <div class="cm-row"><span class="lbl">📋 লেনদেন</span><span class="val cnt">${selected.length}টি</span></div>
    <div class="cm-divider"></div>
    <div class="cm-row"><span class="lbl">মোট জমা</span><span class="val amt">৳${fmt(total)}</span></div>
  </div>`;
  const ok = await confirmAct('', {
    title:'ব্যাংক জমা নিশ্চিতকরণ',
    icon:'🏦',
    iconClass:'bank',
    okText:'হ্যাঁ, জমা নিশ্চিত করুন',
    cancelText:'বাতিল',
    okClass:'bank',
    html: summaryHtml
  });
  if(!ok) return;
  showL(true);
  try{
    await FB.add('bank', {
      bankName, accountNo, type:'জমা', amount: total, date,
      note: note || (`${selected.length}টি লেনদেন একত্রে জমা`)
    });
    for(const s of selected){
      await FB.update(s.coll, s._id, {bankDeposited:true, bankDepositedAt:date});
    }
    showL(false);

function bnkSetType(v){
  document.querySelectorAll('#bnkmTypes .emo-tab').forEach(b=>b.classList.toggle('on', b.dataset.v===v));
  const hd = document.getElementById('bnkmHd');
  if(hd){ hd.classList.remove('success','danger'); hd.classList.add(v==='জমা'?'success':'danger'); }
}
async function saveBankModal(id){
  const typeEl = document.querySelector('#bnkmTypes .emo-tab.on');
  const d = {
    bankName: document.getElementById('bnkm_name').value.trim(),
    accountNo: document.getElementById('bnkm_ac').value.trim(),
    type: typeEl ? typeEl.dataset.v : 'জমা',
    amount: +document.getElementById('bnkm_amt').value,
    date: document.getElementById('bnkm_date').value,
    note: document.getElementById('bnkm_note').value.trim()
  };
  if(!d.bankName||!d.amount) return toast('ব্যাংকের নাম ও পরিমাণ আবশ্যক','err');
  showL(true);
  try{
    if(id) await FB.update('bank',id,d); else await FB.add('bank',d);
    showL(false); closeEmo('bnkMov'); toast('সফল!'); render();
  }catch(e){showL(false);toast(e.message,'err')}
}

/* ━━━ TRANSACTION FILTER (date range, all categories, PDF) ━━━ */
async function pgTxFilter(){
  const t0 = today();
  const firstOfMonth = t0.slice(0,8)+'01';
  if(!S.txfStart) S.txfStart = firstOfMonth;
  if(!S.txfEnd) S.txfEnd = t0;
  const start = S.txfStart, end = S.txfEnd;
  const [fees, ie, loans, invs, bank] = await Promise.all([
    FB.list('fees').catch(()=>[]),
    FB.list('incomeExpense').catch(()=>[]),
    FB.list('loans').catch(()=>[]),
    FB.list('investments').catch(()=>[]),
    FB.list('bank').catch(()=>[])
  ]);
  const getD = x => x.date || (x.timestamp ? new Date(x.timestamp).toISOString().slice(0,10) : '');
  const inRange = x => { const d = getD(x); if(!d) return false; return (!start||d>=start) && (!end||d<=end); };
  const members = S.cache.members || (await FB.list('members').catch(()=>[]));
  if(!S.cache.members) S.cache.members = members;
  const memMap = {};
  members.forEach(m=>{ memMap[String(m.id)] = m; });
  const memInfo = (mid, mname) => {
    const m = memMap[String(mid||'')];
    const name = m?.name || mname || '';
    if(mid && name) return `${name} (আইডি: ${mid})`;
    if(name) return name;
    if(mid) return 'আইডি: '+mid;
    return '';
  };
  const rows = [];
  fees.filter(inRange).forEach(x=>rows.push({_cat:'fees',_id:x._id,_label:'ফি - '+(x.type||''),_sub:memInfo(x.memberId,x.memberName),_amt:+x.amount||0,_in:x.type==='জমা',_noflow:x.type==='বকেয়া',_date:getD(x),_raw:x}));
  ie.filter(inRange).forEach(x=>rows.push({_cat:'incomeExpense',_id:x._id,_label:(x.type||'')+' - '+(x.category||''),_sub:x.note||'',_amt:+x.amount||0,_in:x.type==='আয়',_date:getD(x),_raw:x}));
  loans.filter(inRange).forEach(x=>rows.push({_cat:'loans',_id:x._id,_label:'ঋণ '+(x.type||''),_sub:memInfo(x.memberId,x.memberName),_amt:+x.amount||0,_in:x.type!=='প্রদান',_date:getD(x),_raw:x}));
  invs.filter(inRange).forEach(x=>rows.push({_cat:'investments',_id:x._id,_label:'বিনিয়োগ - '+(x.title||x.category||''),_sub:x.note||'',_amt:+x.amount||0,_in:x.type==='in'||x.type==='ফেরত',_date:getD(x),_raw:x}));
  bank.filter(inRange).forEach(x=>rows.push({_cat:'bank',_id:x._id,_label:'ব্যাংক - '+(x.bankName||''),_sub:x.note||x.accountNo||'',_amt:+x.amount||0,_in:x.type==='জমা',_date:getD(x),_raw:x}));
  rows.sort((a,b)=>(b._date||'').localeCompare(a._date||''));
  let inSum=0, outSum=0;
  rows.forEach(r=>{ if(r._noflow) return; if(r._in) inSum+=r._amt; else outSum+=r._amt; });
  window._txfMap = {};
  rows.forEach(r=>{ window._txfMap[r._cat+':'+r._id]=r; });
  const catBadge = c => ({fees:'ফি',incomeExpense:'আয়/ব্যয়',loans:'ঋণ',investments:'বিনিয়োগ',bank:'ব্যাংক'}[c]||c);
  return `<div class="main">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      <div class="pg-title" style="margin:0;flex:1;min-width:0">🔎 লেনদেন ফিল্টার</div>
      <button class="dl-btn dl-pdf" onclick="showDlModal('txFilter')">⬇️ ডাউনলোড</button>
    </div>
    <div class="card" style="margin-bottom:13px"><div class="cb">
      <div class="frow">
        <div class="fg"><label>শুরুর তারিখ</label>
          <input type="date" class="fi" value="${start}" onchange="S.txfStart=this.value;render()">
        </div>
        <div class="fg"><label>শেষ তারিখ</label>
          <input type="date" class="fi" value="${end}" onchange="S.txfEnd=this.value;render()">
        </div>
        <div class="fg" style="align-self:flex-end">
          <button class="btn btn-sm" onclick="S.txfStart='${firstOfMonth}';S.txfEnd='${t0}';render()">↺ রিসেট</button>
        </div>
      </div>
    </div></div>
    <div class="sgrid">
      <div class="scard green"><div class="s-icon">⬇️</div><div><div class="sv">${fmt(inSum)}</div><div class="sl">মোট জমা/আয়</div></div></div>
      <div class="scard red"><div class="s-icon">⬆️</div><div><div class="sv">${fmt(outSum)}</div><div class="sl">মোট ব্যয়/উত্তোলন</div></div></div>
      <div class="scard purple"><div class="s-icon">💼</div><div><div class="sv">${fmt(inSum-outSum)}</div><div class="sl">নীট</div></div></div>
    </div>
    <div style="font-weight:700;margin:14px 4px 8px">📋 লেনদেন তালিকা (${rows.length})</div>
    <div class="card">
      ${(()=>{
        if(rows.length===0) return emptyHTML('নির্দিষ্ট সময়ে কোনো লেনদেন নেই');
        const pg = pageOf(rows,'txf');
        const html = pg.slice.map(r=>{
        const key = r._cat+':'+r._id;
        const editFn = ({
          fees: `openFeeEditModal(window._txfMap['${key}']._raw)`,
          incomeExpense: `openIEModal(window._txfMap['${key}']._raw)`,
          investments: `openInvModal(window._txfMap['${key}']._raw)`,
          bank: `openBankModal(window._txfMap['${key}']._raw)`,
          loans: `openLoanEditModal(window._txfMap['${key}']._raw)`

        })[r._cat];
        return `<div class="trow">
          <div class="t-ic ${r._noflow?'loan':(r._in?'in':'out')}">${r._noflow?'⏰':(r._in?'↓':'↑')}</div>
          <div class="t-info">
            <div class="t-title"><span class="badge ${r._noflow?'y':(r._in?'g':'r')}">${esc(catBadge(r._cat))}</span> ${esc(r._label)}</div>
            <div class="t-date">${dateStr(r._date)} ${r._sub?'• '+esc(r._sub):''}</div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div class="t-amt ${r._noflow?'loan':(r._in?'in':'out')}">${fmt(r._amt)}</div>
            <div style="display:flex;gap:6px">
              ${editFn?`<button style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px" onclick="${editFn}">✏️</button>`:''}
              <button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px" onclick="delTx('${r._cat}','${r._id}')">🗑️</button>
            </div>
          </div>
        </div>`;
        }).join('');
        return html + pagerHTML('txf',pg.p,pg.total);
      })()}
    </div>
  </div>`;
}

  f.id = '_pdfFrame';

  doc.open(); doc.write(html); doc.close();

  };
  // Wait for fonts/layout
  if(f.contentWindow.document.readyState === 'complete') setTimeout(trigger, 500);
  else f.onload = ()=> setTimeout(trigger, 500);
}

/* ━━━ ALL MEMBERS REPORT (table) ━━━ */
async function pgAllMembersReport(){
  const [members, fees, loans] = await Promise.all([
    FB.list('members','_id').catch(()=>[]),
    FB.list('fees').catch(()=>[]),
    FB.list('loans').catch(()=>[])
  ]);
  const feeGroups = {};
  fees.forEach(f=>{ const mid=String(f.memberId||''); if(mid) (feeGroups[mid] ||= []).push(f); });
  const map = {};
  members.forEach(m=>{ const bal=calcFeeBalance(feeGroups[String(m.id||'')]||[]); map[m.id]={id:m.id,name:m.name||'-',j:bal.jama,b:bal.bokaya,w:bal.uttolan,lg:0,lr:0}; });
  loans.forEach(l=>{
    const r = map[l.memberId]; if(!r) return;
    const a=+l.amount||0;
    if(l.type==='প্রদান')r.lg+=a; else r.lr+=a;
  });
  const rows = Object.values(map);
  // totals
  let TJ=0,TB=0,TA=0,TW=0,TL=0;
  const body = rows.map((r,i)=>{
    const curJ = r.j - r.w;
    const curB = r.b;
    const advance = Math.max(0, curJ - r.b);
    const loanOut = r.lg - r.lr;
    TJ+=curJ; TB+=curB; TA+=advance; TW+=r.w; TL+=loanOut;
    return `<tr>
      <td>${i+1}</td>
      <td>${esc(r.id)}</td>
      <td style="text-align:left">${esc(r.name)}</td>
      <td class="num">${fmt(curJ)}</td>
      <td class="num" style="color:var(--danger)">${fmt(curB)}</td>
      <td class="num" style="color:var(--ok)">${fmt(advance)}</td>
      <td class="num">${fmt(r.w)}</td>
      <td class="num" style="color:var(--primary)">${fmt(loanOut)}</td>
    </tr>`;
  }).join('');

  return `<div class="main">
    <div class="dl-bar">
      <span class="pg-title" style="margin:0">📋 সকল সদস্যের রিপোর্ট</span>

          <th>ক্রমিক</th><th>আইডি</th><th>সদস্যের নাম</th>
          <th>বর্তমান জমা</th><th>বর্তমান বকেয়া</th><th>অগ্রিম</th><th>উত্তোলন</th><th>ঋণ</th>
        </tr></thead>
        <tbody>
          ${rows.length===0?`<tr><td colspan="8" style="padding:20px;text-align:center;color:var(--muted)">কোনো সদস্য নেই</td></tr>`:body}
        </tbody>
        ${rows.length?`<tfoot><tr>
          <td colspan="3" style="text-align:right;font-weight:700">মোট</td>
          <td class="num" style="font-weight:700">${fmt(TJ)}</td>
          <td class="num" style="font-weight:700;color:var(--danger)">${fmt(TB)}</td>
          <td class="num" style="font-weight:700;color:var(--ok)">${fmt(TA)}</td>
          <td class="num" style="font-weight:700">${fmt(TW)}</td>
          <td class="num" style="font-weight:700;color:var(--primary)">${fmt(TL)}</td>

async function pgLoanReport(){

    FB.list('loans').catch(()=>[])
  ]);
  S.cache.members = members;
  const memMap={}; members.forEach(m=>memMap[m.id]=m);
  const agg = {};

  loans.forEach(l=>{
    const mid = String(l.memberId||'');
    if(!agg[mid]) agg[mid] = {id:mid, name: memMap[mid]?.name || l.memberName || mid, g:0, r:0, txs:[]};
    const a = +l.amount||0;
    if(l.type==='প্রদান'){ agg[mid].g+=a; TG+=a; } else { agg[mid].r+=a; TR+=a; }
    agg[mid].txs.push(l);
  });
  const rows = Object.values(agg).filter(r=>r.g||r.r).sort((a,b)=>(b.g-b.r)-(a.g-a.r));
  const totalOut = TG - TR;
  const sel = S.lrMember;
  const selData = sel ? agg[String(sel.id)] : null;
  const selTxs = selData ? selData.txs.slice().sort((a,b)=>{
    const ta=a.timestamp?.toDate?a.timestamp.toDate().getTime():new Date(a.date||0).getTime();
    const tb=b.timestamp?.toDate?b.timestamp.toDate().getTime():new Date(b.date||0).getTime();
    return tb-ta;
  }) : [];

  return `<div class="main">

      <div class="pg-title" style="margin:0">🤝 ঋণ রিপোর্ট</div>

      <div class="scard orange"><div class="s-icon">⬆️</div><div><div class="sv">${fmt(TG)}</div><div class="sl">মোট প্রদত্ত</div></div></div>
      <div class="scard green"><div class="s-icon">⬇️</div><div><div class="sv">${fmt(TR)}</div><div class="sl">মোট ফেরত</div></div></div>
    </div>

async function saveSettings(){
  const ejSid = document.getElementById('ej_sid')?.value.trim() || '';
  const ejTid = document.getElementById('ej_tid')?.value.trim() || '';
  const ejPk  = document.getElementById('ej_pk')?.value.trim() || '';
  const d = {
    name: document.getElementById('s_name').value.trim(),
    address: document.getElementById('s_addr').value.trim(),
    mobile: document.getElementById('s_mob').value.trim(),
    email: document.getElementById('s_email')?.value.trim() || '',
    logo: (document.getElementById('logoLink')?.value.trim()) || S.settings.logo || '',
    emailNotify: document.getElementById('s_emailNotify') ? document.getElementById('s_emailNotify').checked : (S.settings.emailNotify!==false),
    emailjs: { serviceId: ejSid, templateId: ejTid, publicKey: ejPk }
  };
  if(!d.name) return toast('নাম আবশ্যক','err');
  showL(true);
  try{
    await FB.saveSettings(d);
    S.settings = d; S.tempLogo=null;
    showL(false); toast('সংরক্ষিত!'); render();
  }catch(e){showL(false);toast(e.message,'err')}
}
async function saveAdmin(){
  const pw = document.getElementById('a_pw').value;
  const newId = document.getElementById('a_id').value.trim();
  const d = {
    id: newId,
    name: document.getElementById('a_name').value.trim(),
    email: (document.getElementById('a_email')?.value||'').trim()
  };
  if(pw) d.password = pw;
  if(!d.id) return toast('আইডি আবশ্যক','err');
  showL(true);
  try{
    await db.collection('config').doc('admin').set(d,{merge:true});
    // Firebase Auth-এও password update করি (যদি নতুন password দেওয়া হয়)
    if(pw){
      try{
        const user = auth.currentUser;
        if(user) await user.updatePassword(pw);
      }catch(authErr){
        console.warn('Auth password update failed:', authErr.message);
      }
    }
    showL(false); toast('সিকিউরিটি আপডেট হয়েছে!');
  }catch(e){showL(false);toast(e.message,'err')}
}

function copyPay(id){
  const p = window._payMap?.[id];
  const text = String(p?.number||'');
  if(!text) return;
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('কপি হয়েছে: '+text)).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  try{
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
    toast('কপি হয়েছে: '+text);
  }catch(e){ toast('কপি ব্যর্থ','err'); }
}

function driveId(url){
  if(!url) return '';
  const s = String(url);
  let m = s.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if(m) return m[1];
  m = s.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if(m) return m[1];
  return '';
}
function drivePreviewHTML(url, h){
  const id = driveId(url);
  if(!id) return url ? `<div style="font-size:12px;color:#888;padding:8px">প্রিভিউ লোড করা যায়নি</div>` : '';
  const hh = h||220;
  return `<div style="position:relative;width:100%;height:${hh}px;border-radius:12px;overflow:hidden;background:#1a1a1a;box-shadow:0 4px 20px rgba(0,0,0,.15)">
    <iframe src="https://drive.google.com/file/d/${id}/preview" style="width:100%;height:100%;border:0;background:#1a1a1a" allow="autoplay" allowfullscreen></iframe>
    <div style="position:absolute;top:6px;right:6px;width:44px;height:44px;background:#1a1a1a;border-radius:8px;pointer-events:auto"></div>
  </div>`;
}
function driveThumbURL(url){
  const id = driveId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1200` : '';
}
function logoURL(url){ if(!url) return ''; return driveThumbURL(url) || url; }

async function savePush(id){
  try{
    const tEl=document.getElementById('pnTitle');
    const mEl=document.getElementById('pnMsg');
    const lEl=document.getElementById('pnLink');
    const dEl=document.getElementById('pnDur');
    const aEl=document.getElementById('pnAct');
    if(!tEl||!dEl||!aEl){ toast('ফর্ম লোড হয়নি, আবার চেষ্টা করুন','err'); return; }
    const title = (tEl.value||'').trim();
    const message = (mEl?.value||'').trim();
    const driveLink = (lEl?.value||'').trim();
    const durationSec = Math.max(1, parseInt(dEl.value)||10);
    const active = aEl.value==='1';
    if(!title){ toast('শিরোনাম দিন','err'); return; }
    const d = {title, message, driveLink, durationSec, active, createdAt: Date.now()};
    showL(true);
    if(id) await FB.setDoc('pushNotifs', id, d);
    else await FB.add('pushNotifs', d);
    showL(false);
    document.getElementById('emodal')?.remove();
    toast('সংরক্ষিত হয়েছে ✓','ok');
    render();
  }catch(e){
    showL(false);
    console.error('savePush error:', e);
    toast('সংরক্ষণে ত্রুটি: '+(e?.message||e?.code||'Unknown'),'err');
  }
}

async function showPushOnLogin(){
  let list = [];
  try{ list = await FB.list('pushNotifs','_id'); }catch(e){ return; }
  const active = list.filter(p=>p.active!==false);
  if(active.length===0) return;
  active.sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
  const p = active[0];
  const dur = Math.max(1, parseInt(p.durationSec)||10);
  document.getElementById('pushOv')?.remove();
  const ov = document.createElement('div');
  ov.id = 'pushOv';
  ov.className = 'emo-bg on';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,30,.78);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;opacity:1';
  const thumb = driveThumbURL(p.driveLink||'');
  ov.innerHTML = `<div style="background:#fff;border-radius:18px;max-width:520px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:popIn .3s">

      <div style="font-size:22px">🔔</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:16px;line-height:1.3">${esc(p.title||'')}</div>
        <div id="pushCnt" style="font-size:11px;opacity:.85;margin-top:2px">${dur} সেকেন্ড পর অটোমেটিক বন্ধ হবে</div>
      </div>
    </div>
    <div style="padding:14px 16px;overflow:auto">
      ${p.message?`<div style="font-size:14px;color:#333;white-space:pre-wrap;word-break:break-word;line-height:1.7;margin-bottom:10px">${esc(p.message)}</div>`:''}
      ${thumb?`<div style="text-align:center"><img src="${thumb}" alt="" style="max-width:100%;height:auto;border-radius:10px;display:block;margin:0 auto" onerror="this.style.display='none'"></div>`:''}
    </div>
  </div>`;
  document.body.appendChild(ov);
  let left = dur;
  const cntEl = ov.querySelector('#pushCnt');
  const tick = setInterval(()=>{
    left--;

  }, 1000);
}

async function savePubRep(id){

function togglePwView(){
  const el = document.getElementById('curPwView');

  if(el.dataset.show === '1'){

    el.dataset.show = '1';
    el.classList.add('plain');
    btn.innerHTML = '🙈 লুকান';

async function changeMyPassword(){
  const oldPw = (document.getElementById('cpOld').value||'').trim();
  const newPw = (document.getElementById('cpNew').value||'').trim();
  const conf  = (document.getElementById('cpConf').value||'').trim();
  if(!oldPw || !newPw || !conf) return toast('সব ঘর পূরণ করুন','err');
  if(oldPw !== (S.user.password||'')) return toast('বর্তমান পাসওয়ার্ড ভুল','err');
  if(newPw.length < 4) return toast('নতুন পাসওয়ার্ড কমপক্ষে ৪ অক্ষর হতে হবে','err');
  if(newPw !== conf) return toast('নতুন পাসওয়ার্ড মিলছে না','err');
  if(newPw === oldPw) return toast('নতুন পাসওয়ার্ড বর্তমানটির মতই','err');
  try{
    showL(true);
    // Firestore-এ password update
    await db.collection('members').doc(S.user.id).update({password:newPw});
    // Firebase Auth-এও password update
    try{
      const user = auth.currentUser;
      if(user) await user.updatePassword(newPw);
    }catch(authErr){
      // Auth update ব্যর্থ হলেও চলবে (Firestore update সফল হয়েছে)
      console.warn('Auth password update failed:', authErr.message);
    }
    S.user.password = newPw;
    showL(false);
    toast('পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে','ok');
    document.getElementById('cpOld').value='';
    document.getElementById('cpNew').value='';
    document.getElementById('cpConf').value='';
    const el = document.getElementById('curPwView');
    if(el){ el.textContent='••••••••'; el.dataset.show='0'; el.classList.remove('plain'); }
    const btn = document.getElementById('pwToggleBtn');
    if(btn) btn.innerHTML='👁️ দেখুন';
  }catch(e){
    showL(false);
    toast('আপডেট ব্যর্থ: '+(e.message||e),'err');
  }
}

/* ── PDF প্রিন্ট ফ্রেম হেল্পার ── */
function _printFrame(html){
  const old = document.getElementById('_dlPdfFrame');
  if(old) old.remove();
  const f = document.createElement('iframe');
  f.id = '_dlPdfFrame';
  f.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden';
  document.body.appendChild(f);
  const doc = f.contentWindow.document;
  doc.open(); doc.write(html); doc.close();
  const go = ()=>{ try{ f.contentWindow.focus(); f.contentWindow.print(); toast('PDF ডায়লগ খুলছে...'); }catch(e){ toast('PDF তৈরিতে সমস্যা','err'); } };
  if(f.contentDocument.readyState==='complete') setTimeout(go,500); else f.onload=()=>setTimeout(go,500);
}

/* ── CSV ডাউনলোড হেল্পার ── */
function _downloadCSVFile(rows, filename){
  const BOM = '\uFEFF';
  const csv = BOM + rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('CSV ডাউনলোড হচ্ছে...');
}

    .in{color:#1a7d2c;font-weight:700} .out{color:#c62828;font-weight:700}
    .ftr{margin-top:14px;text-align:center;font-size:10px;color:#666;border-top:1px solid #ddd;padding-top:6px}
    tr{page-break-inside:avoid}
  </style>`;
}
function _pdfHdr(title, subtitle){
  const st = S.settings||{};
  const now = new Date();
  const printDate = now.toLocaleDateString('bn-BD')+' '+now.toLocaleTimeString('bn-BD');
  return `<div class="rpt-hdr">
    <h1>${esc(st.name||'সমিতি')}</h1>
    <div class="sub">${[st.address,st.mobile?'মোবাইল: '+st.mobile:''].filter(Boolean).join(' • ')}</div>
    <div class="sub2">${esc(title)}</div>
    ${subtitle?`<div class="sub" style="margin-top:2px">${esc(subtitle)}</div>`:''}
    <div class="sub">প্রিন্ট তারিখ: ${esc(printDate)}</div>
  </div>`;
}

/* ══════════════════════════════════════
   downloadPDF — সব রিপোর্টের জন্য
   ══════════════════════════════════════ */
async function downloadPDF(key, printMode){
  showL(true);
  try{
    let html = '';
    const st = S.settings||{};
    switch(key){

      /* ── ব্যালেন্স শিট ── */
      case 'balance': {
        const s = await FB.summary();
        const cashInHand = s.totalJama+s.totalLoanReturned+s.totalIncome+s.totalBankWithdraw - s.totalLoanGiven-s.totalExpense-s.totalBankDeposit-s.totalInvestment;

        const loanRec = s.totalLoanGiven-s.totalLoanReturned;

            <div class="sum-c"><div class="v">${fmt(assets)}</div><div class="l">সর্বমোট সম্পদ</div></div>

            <tr><td class="c" style="width:28px">১</td><td>সদস্যদের জমা</td><td class="r in">${fmt(s.totalJama)}</td></tr>
            <tr><td class="c">২</td><td>ফেরত পাওয়া ঋণ</td><td class="r in">${fmt(s.totalLoanReturned)}</td></tr>
            <tr><td class="c">৩</td><td>অন্যান্য আয়</td><td class="r in">${fmt(s.totalIncome)}</td></tr>
            <tr style="background:#f0fff4"><td colspan="2" style="font-weight:800">মোট আয়</td><td class="r in" style="font-weight:800">${fmt(s.totalJama+s.totalLoanReturned+s.totalIncome)}</td></tr>
            <tr><td colspan="2" style="font-weight:800;background:#fff5f5">✦ ব্যয় / প্রদান</td><td></td></tr>
            <tr><td class="c">১</td><td>প্রদত্ত ঋণ</td><td class="r out">${fmt(s.totalLoanGiven)}</td></tr>
            <tr><td class="c">২</td><td>সাধারণ ব্যয়</td><td class="r out">${fmt(s.totalExpense)}</td></tr>
            <tr><td class="c">৩</td><td>মোট বিনিয়োগ</td><td class="r out">${fmt(s.totalInvestment)}</td></tr>
            <tr style="background:#fff5f5"><td colspan="2" style="font-weight:800">মোট ব্যয়</td><td class="r out" style="font-weight:800">${fmt(s.totalLoanGiven+s.totalExpense+s.totalInvestment)}</td></tr>
            <tr><td colspan="2" style="font-weight:800;background:#f3f0ff">✦ সম্পদ</td><td></td></tr>
            <tr><td class="c">১</td><td>হাতে নগদ (আনুমানিক)</td><td class="r">${fmt(cashInHand)}</td></tr>

      /* ── সকল সদস্য রিপোর্ট ── */
      case 'allMembers': {
        const [members,fees,loans] = await Promise.all([FB.list('members','_id').catch(()=>[]),FB.list('fees').catch(()=>[]),FB.list('loans').catch(()=>[])]);
        const feeGroups={}; fees.forEach(f=>{const mid=String(f.memberId||''); if(mid) (feeGroups[mid] ||= []).push(f);});
        const mp={};
        members.forEach(m=>{const bal=calcFeeBalance(feeGroups[String(m.id||'')]||[]);mp[m.id]={id:m.id,name:m.name||'-',j:bal.jama,b:bal.bokaya,w:bal.uttolan,lg:0,lr:0}});
        loans.forEach(l=>{const r=mp[l.memberId];if(!r)return;const a=+l.amount||0;if(l.type==='প্রদান')r.lg+=a;else r.lr+=a});
        const rows=Object.values(mp);
        let TJ=0,TB=0,TW=0,TL=0;
        const body=rows.map((r,i)=>{const cj=r.j-r.w,cb=r.b,lo=r.lg-r.lr;TJ+=cj;TB+=cb;TW+=r.w;TL+=lo;
          return `<tr><td class="c">${i+1}</td><td class="c">${esc(r.id)}</td><td>${esc(r.name)}</td><td class="r in">${fmt(cj)}</td><td class="r out">${fmt(cb)}</td><td class="r">${fmt(r.w)}</td><td class="r out">${fmt(lo)}</td></tr>`;}).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>সদস্য রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('সকল সদস্যের আর্থিক রিপোর্ট',`মোট সদস্য: ${rows.length} জন`)}

            <div class="sum-c"><div class="v out">${fmt(TB)}</div><div class="l">মোট বকেয়া</div></div>
            <div class="sum-c"><div class="v out">${fmt(TL)}</div><div class="l">চলমান ঋণ</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>আইডি</th><th class="l">নাম</th><th>বর্তমান জমা</th><th>বকেয়া</th><th>উত্তোলন</th><th>ঋণ</th></tr></thead>
          <tbody>${body}</tbody>
          <tfoot><tr><td colspan="3" style="font-weight:800;text-align:right">মোট</td><td class="r in" style="font-weight:800">${fmt(TJ)}</td><td class="r out" style="font-weight:800">${fmt(TB)}</td><td class="r" style="font-weight:800">${fmt(TW)}</td><td class="r out" style="font-weight:800">${fmt(TL)}</td></tr></tfoot>
          </table><div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      /* ── ফি রিপোর্ট ── */
      case 'fee': {
        const fees=await FB.list('fees').catch(()=>[]);
        const members=await FB.list('members','_id').catch(()=>[]);
        const memMap={};members.forEach(m=>memMap[m.id]=m);
        fees.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        let tJ=0,tB=calcTotalBokaya(fees),tW=0;
        fees.forEach(f=>{const a=+f.amount||0;if(f.type==='জমা')tJ+=a;else if(f.type==='উত্তোলন')tW+=a});
        const body=fees.map((f,i)=>`<tr><td class="c">${i+1}</td><td class="c">${f.date||dateStr(f.timestamp)}</td><td>${esc(memMap[f.memberId]?.name||f.memberName||f.memberId||'-')}</td><td class="c">${esc(f.memberId||'-')}</td><td class="c">${esc(f.type||'-')}</td><td class="r ${f.type==='জমা'?'in':'out'}">${fmt(f.amount)}</td><td>${esc(f.note||'')}</td></tr>`).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>ফি রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('ফি রিপোর্ট',`মোট এন্ট্রি: ${fees.length}টি`)}
          <div class="sum">
            <div class="sum-c"><div class="v in">${fmt(tJ)}</div><div class="l">মোট জমা</div></div>
            <div class="sum-c"><div class="v out">${fmt(tB)}</div><div class="l">মোট বকেয়া</div></div>
            <div class="sum-c"><div class="v">${fmt(tW)}</div><div class="l">মোট উত্তোলন</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>তারিখ</th><th class="l">সদস্যের নাম</th><th>আইডি</th><th>ধরণ</th><th>পরিমাণ (৳)</th><th class="l">বিবরণ</th></tr></thead>
          <tbody>${body||'<tr><td colspan="7" class="c">কোনো এন্ট্রি নেই</td></tr>'}</tbody></table>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;

      }

      /* ── ব্যক্তিগত ফি রিপোর্ট ── */
      case 'memberFee': {
        const sel = S.frMember;
        if(!sel){ showL(false); toast('আগে একজন সদস্য বাছাই করুন','err'); return; }
        const [fees, loans] = await Promise.all([
          FB.listWhere('fees','memberId',sel.id).catch(()=>[]),
          FB.listWhere('loans','memberId',sel.id).catch(()=>[])
        ]);
        const feeBal = calcFeeBalance(fees);
        let lg=0, lr=0;
        loans.forEach(l=>{const a=+l.amount||0; if(l.type==='প্রদান')lg+=a; else lr+=a;});
        const curJama = feeBal.netJama, curBokaya = feeBal.bokaya, withdraw = feeBal.uttolan, loanOut = lg-lr;
        const tx = [
          ...fees.map(f=>({...f,_cat:'fees', _label:f.type||'-', _amt:+f.amount||0, _in:f.type==='জমা'})),
          ...loans.map(l=>({...l,_cat:'loans', _label:'ঋণ '+(l.type||''), _amt:+l.amount||0, _in:l.type==='ফেরত'}))
        ].sort((a,b)=>{
          const ta=a.timestamp?.toDate?a.timestamp.toDate().getTime():new Date(a.date||0).getTime();
          const tb=b.timestamp?.toDate?b.timestamp.toDate().getTime():new Date(b.date||0).getTime();
          return ta-tb;
        });
        const body = tx.length===0
          ? '<tr><td colspan="6" class="c" style="padding:18px;color:#888">কোনো লেনদেন নেই</td></tr>'
          : tx.map((t,i)=>{
              const cat = t._cat==='fees'?'ফি':'ঋণ';
              return `<tr>
                <td class="c">${i+1}</td>
                <td class="c">${esc(t.date||dateStr(t.timestamp)||'-')}</td>
                <td class="c"><span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${t._cat==='fees'?'#e3f2fd':'#f3e5f5'};color:${t._cat==='fees'?'#0D47A1':'#6a1b9a'}">${cat}</span></td>
                <td class="c"><span style="font-weight:700;color:${t._in?'#1a7d2c':'#c62828'}">${esc(t._label)}</span></td>

            .tr{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
            .to{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
            .tp{background:#f3e5f5;color:#6a1b9a;border:1px solid #e1bee7}

          ${_pdfHdr('ব্যক্তিগত ফি রিপোর্ট', `সদস্য: ${esc(sel.name||'-')} • আইডি: ${esc(sel.id||'-')}`)}
          <div class="mh">
            <div class="mh-av">${initial}</div>
            <div class="mh-info">
              <div class="nm">${esc(sel.name||'-')}</div>
              <div class="id">🆔 আইডি: ${esc(sel.id||'-')}</div>
              ${sel.mobile?`<div class="mob">📱 ${esc(sel.mobile)}</div>`:''}
              ${sel.email?`<div class="mob">✉️ ${esc(sel.email)}</div>`:''}
            </div>
            <div style="text-align:right;font-size:11px;opacity:.9">
              <div>মোট লেনদেন</div>
              <div style="font-size:20px;font-weight:800">${tx.length}টি</div>
            </div>
          </div>
          <div class="tiles">
            <div class="tile tg"><div class="tv">${fmt(curJama)}</div><div class="tl">⬇️ বর্তমান জমা</div></div>
            <div class="tile tr"><div class="tv">${fmt(curBokaya)}</div><div class="tl">⏳ বর্তমান বকেয়া</div></div>
            <div class="tile to"><div class="tv">${fmt(withdraw)}</div><div class="tl">💸 মোট উত্তোলন</div></div>
            <div class="tile tp"><div class="tv">${fmt(loanOut)}</div><div class="tl">🤝 চলমান ঋণ</div></div>
          </div>
          <div class="sect">📋 সকল আর্থিক লেনদেন</div>
          <table>
            <thead><tr>
              <th style="width:34px">ক্রমিক</th>
              <th style="width:80px">তারিখ</th>
              <th style="width:54px">ক্যাটাগরি</th>
              <th style="width:90px">ধরন</th>
              <th style="width:90px">পরিমাণ (৳)</th>
              <th class="l">বিবরণ</th>
            </tr></thead>
            <tbody>${body}</tbody>
          </table>
          <div class="sig">
            <div><div class="ln"></div>সদস্যের স্বাক্ষর</div>
            <div><div class="ln"></div>হিসাবরক্ষক</div>
            <div><div class="ln"></div>সভাপতি</div>
          </div>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ • ${esc(sel.name||'')} (${esc(sel.id||'')})</div>
          </body></html>`;
        break;
      }

      /* ── আয়-ব্যয় রিপোর্ট ── */
      case 'income': {
        const list=await FB.list('incomeExpense').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        let tI=0,tE=0;
        list.forEach(x=>{const a=+x.amount||0;if(x.type==='আয়')tI+=a;else tE+=a});
        const body=list.map((x,i)=>`<tr><td class="c">${i+1}</td><td class="c">${x.date||dateStr(x.timestamp)}</td><td class="c">${esc(x.type||'-')}</td><td>${esc(x.category||'-')}</td><td class="r ${x.type==='আয়'?'in':'out'}">${fmt(x.amount)}</td><td>${esc(x.note||'')}</td></tr>`).join('');

          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;

      /* ── ঋণ রিপোর্ট ── */
      case 'loan': {
        const [members,loans]=await Promise.all([FB.list('members','_id').catch(()=>[]),FB.list('loans').catch(()=>[])]);
        const memMap={};members.forEach(m=>memMap[m.id]=m);
        loans.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        let tG=0,tR=0;
        loans.forEach(l=>{const a=+l.amount||0;if(l.type==='প্রদান')tG+=a;else tR+=a});
        const body=loans.map((l,i)=>`<tr><td class="c">${i+1}</td><td class="c">${l.date||dateStr(l.timestamp)}</td><td>${esc(memMap[l.memberId]?.name||l.memberName||l.memberId||'-')}</td><td class="c">${esc(l.memberId||'-')}</td><td class="c">${esc(l.type||'-')}</td><td class="r ${l.type==='প্রদান'?'out':'in'}">${fmt(l.amount)}</td><td class="c">${l.interest?l.interest+'%':'-'}</td><td>${esc(l.note||'')}</td></tr>`).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>ঋণ রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('ঋণ রিপোর্ট',`মোট এন্ট্রি: ${loans.length}টি`)}
          <div class="sum">
            <div class="sum-c"><div class="v out">${fmt(tG)}</div><div class="l">মোট প্রদত্ত</div></div>
            <div class="sum-c"><div class="v in">${fmt(tR)}</div><div class="l">মোট ফেরত</div></div>
            <div class="sum-c"><div class="v out">${fmt(tG-tR)}</div><div class="l">চলমান ঋণ</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>তারিখ</th><th class="l">সদস্যের নাম</th><th>আইডি</th><th>ধরণ</th><th>পরিমাণ (৳)</th><th>সুদ</th><th class="l">বিবরণ</th></tr></thead>
          <tbody>${body||'<tr><td colspan="8" class="c">কোনো এন্ট্রি নেই</td></tr>'}</tbody></table>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      /* ── বিনিয়োগ রিপোর্ট ── */
      case 'investment': {
        const list=await FB.list('investments').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        let tOut=0,tIn=0;
        list.forEach(x=>{const a=+x.amount||0;if(invType(x)==='out')tOut+=a;else tIn+=a});
        const body=list.map((x,i)=>{const t=invType(x);return `<tr><td class="c">${i+1}</td><td class="c">${x.date||dateStr(x.timestamp)}</td><td>${esc(x.title||'-')}</td><td class="c">${t==='out'?'বিনিয়োগ':'ফেরত'}</td><td class="r ${t==='out'?'out':'in'}">${fmt(x.amount)}</td><td>${esc(x.note||'')}</td></tr>`}).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>বিনিয়োগ রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('বিনিয়োগ রিপোর্ট',`মোট এন্ট্রি: ${list.length}টি`)}
          <div class="sum">
            <div class="sum-c"><div class="v out">${fmt(tOut)}</div><div class="l">মোট বিনিয়োগ</div></div>
            <div class="sum-c"><div class="v in">${fmt(tIn)}</div><div class="l">ফেরত</div></div>
            <div class="sum-c"><div class="v">${fmt(tOut-tIn)}</div><div class="l">অনাদায়ী</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>তারিখ</th><th class="l">প্রকল্প</th><th>ধরণ</th><th>পরিমাণ (৳)</th><th class="l">বিবরণ</th></tr></thead>
          <tbody>${body||'<tr><td colspan="6" class="c">কোনো এন্ট্রি নেই</td></tr>'}</tbody></table>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      /* ── ব্যাংক রিপোর্ট ── */
      case 'bank': {
        const list=await FB.list('bank').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        let tD=0,tW=0;
        list.forEach(x=>{const a=+x.amount||0;if(x.type==='জমা')tD+=a;else tW+=a});
        const body=list.map((x,i)=>`<tr><td class="c">${i+1}</td><td class="c">${x.date||dateStr(x.timestamp)}</td><td>${esc(x.bankName||'-')}</td><td class="c">${esc(x.accountNo||'-')}</td><td class="c">${esc(x.type||'-')}</td><td class="r ${x.type==='জমা'?'in':'out'}">${fmt(x.amount)}</td><td>${esc(x.note||'')}</td></tr>`).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>ব্যাংক রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('ব্যাংক রিপোর্ট',`মোট এন্ট্রি: ${list.length}টি`)}
          <div class="sum">
            <div class="sum-c"><div class="v in">${fmt(tD)}</div><div class="l">মোট জমা</div></div>
            <div class="sum-c"><div class="v out">${fmt(tW)}</div><div class="l">উত্তোলন</div></div>
            <div class="sum-c"><div class="v">${fmt(tD-tW)}</div><div class="l">ব্যালেন্স</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>তারিখ</th><th class="l">ব্যাংক</th><th>A/C নম্বর</th><th>ধরণ</th><th>পরিমাণ (৳)</th><th class="l">বিবরণ</th></tr></thead>
          <tbody>${body||'<tr><td colspan="7" class="c">কোনো এন্ট্রি নেই</td></tr>'}</tbody></table>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      /* ── লেনদেন ফিল্টার ── */
      case 'txFilter': {
        const map = window._txfMap||{};
        const rows=Object.values(map).sort((a,b)=>(b._date||'').localeCompare(a._date||''));
        let inSum=0,outSum=0;
        rows.forEach(r=>{if(r._in)inSum+=r._amt;else outSum+=r._amt});
        const catBadge=c=>({fees:'ফি',incomeExpense:'আয়/ব্যয়',loans:'ঋণ',investments:'বিনিয়োগ',bank:'ব্যাংক'}[c]||c);
        const body=rows.map((r,i)=>`<tr><td class="c">${i+1}</td><td class="c">${dateStr(r._date)}</td><td class="c">${esc(catBadge(r._cat))}</td><td>${esc(r._label)}${r._sub?' — '+esc(r._sub):''}</td><td class="c ${r._in?'in':'out'}">${r._in?'জমা':'ব্যয়'}</td><td class="r ${r._in?'in':'out'}">${fmt(r._amt)}</td></tr>`).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>লেনদেন রিপোর্ট</title>${_pdfStyle()}</head><body>
          ${_pdfHdr('লেনদেন রিপোর্ট',`সময়কাল: ${dateStr(S.txfStart)} — ${dateStr(S.txfEnd)} • মোট: ${rows.length}টি`)}
          <div class="sum">
            <div class="sum-c"><div class="v in">${fmt(inSum)}</div><div class="l">মোট জমা/আয়</div></div>
            <div class="sum-c"><div class="v out">${fmt(outSum)}</div><div class="l">মোট ব্যয়/উত্তোলন</div></div>
            <div class="sum-c"><div class="v">${fmt(inSum-outSum)}</div><div class="l">নীট</div></div>
          </div>
          <table><thead><tr><th>ক্রমিক</th><th>তারিখ</th><th>ক্যাটাগরি</th><th class="l">বিবরণ</th><th>ধরণ</th><th>পরিমাণ (৳)</th></tr></thead>
          <tbody>${body||'<tr><td colspan="6" class="c">কোনো লেনদেন নেই</td></tr>'}</tbody></table>
          <div class="ftr">${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      /* ── মাসিক ফি ট্র্যাকার ── */
      case 'monthlyTracker': {
        const bnMonths=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
        const selYear=S.mftYear||new Date().getFullYear();
        const selMonthIdx=S.mftMonth?parseInt(S.mftMonth)-1:-1;
        const showMonths=selMonthIdx>=0?[selMonthIdx]:Array.from({length:12},(_,i)=>i);
        const [members,allFees]=await Promise.all([FB.list('members','name').catch(()=>[]),FB.list('fees').catch(()=>[])]);
        const jamaFees=allFees.filter(f=>{
          if(f.type!=='জমা')return false;
          const d=f.date?new Date(f.date):(f.timestamp?.toDate?f.timestamp.toDate():null);
          return d&&d.getFullYear()===parseInt(selYear);
        });
        const paid={};
        jamaFees.forEach(f=>{const mid=String(f.memberId||'');if(!mid)return;const d=f.date?new Date(f.date):f.timestamp?.toDate?.();if(!d)return;const m=d.getMonth();if(!paid[mid])paid[mid]={};paid[mid][m]=(paid[mid][m]||0)+(+f.amount||0);});
        const thCells=showMonths.map(mi=>`<th>${bnMonths[mi]}</th>`).join('');
        const body=members.map((mem,i)=>{
          const mid=String(mem.id||'');
          const cells=showMonths.map(mi=>{const a=paid[mid]?.[mi];return a?`<td class="c in" style="font-size:10px">✓<br>${fmt(a)}</td>`:`<td class="c out">✗</td>`;}).join('');
          const tot=showMonths.reduce((s,mi)=>s+(paid[mid]?.[mi]||0),0);
          const pc=Math.round(showMonths.filter(mi=>paid[mid]?.[mi]).length/showMonths.length*100);
          return `<tr><td class="c">${i+1}</td><td>${esc(mem.name||'-')}</td><td class="c">${esc(mem.id||'-')}</td>${cells}<td class="r in">${fmt(tot)}</td><td class="c">${pc}%</td></tr>`;
        }).join('');
        html=`<!doctype html><html><head><meta charset="utf-8"><title>মাসিক ফি ট্র্যাকার</title>${_pdfStyle()}
          <style>.in{color:#15803d}.out{color:#b91c1c}th,td{font-size:10px;padding:4px 5px}</style></head><body>
          ${_pdfHdr('মাসিক ফি ট্র্যাকার',`${selYear} সাল${selMonthIdx>=0?' — '+bnMonths[selMonthIdx]:''} • মোট সদস্য: ${members.length}`)}
          <table><thead><tr><th>ক্রমিক</th><th class="l">নাম</th><th>আইডি</th>${thCells}<th>মোট জমা</th><th>অগ্রগতি</th></tr></thead>
          <tbody>${body||'<tr><td colspan="15" class="c">কোনো সদস্য নেই</td></tr>'}</tbody></table>
          <div class="ftr">✓ = জমা দিয়েছেন • ✗ = জমা দেননি • ${esc(st.name||'সমিতি')} কর্তৃপক্ষ</div></body></html>`;
        break;
      }

      default:
        showL(false); toast('অজানা রিপোর্ট','err'); return;
    }
    showL(false);
    _printFrame(html);
  }catch(e){ showL(false); toast('রিপোর্ট তৈরিতে সমস্যা: '+(e.message||e),'err'); }
}

/* ══════════════════════════════════════
   downloadCSV — সব রিপোর্টের জন্য
   ══════════════════════════════════════ */
async function downloadCSV(key){
  showL(true);
  try{
    const st = S.settings||{};
    const now = new Date().toLocaleDateString('bn-BD');
    switch(key){

      case 'balance': {
        const s=await FB.summary();
        const cash=s.totalJama+s.totalLoanReturned+s.totalIncome+s.totalBankWithdraw-s.totalLoanGiven-s.totalExpense-s.totalBankDeposit-s.totalInvestment;
        const rows=[
          ['বিবরণ','পরিমাণ (৳)'],
          ['সদস্যদের জমা',s.totalJama],['ফেরত পাওয়া ঋণ',s.totalLoanReturned],['অন্যান্য আয়',s.totalIncome],
          ['মোট আয়',s.totalJama+s.totalLoanReturned+s.totalIncome],['',''],
          ['প্রদত্ত ঋণ',s.totalLoanGiven],['সাধারণ ব্যয়',s.totalExpense],['মোট বিনিয়োগ',s.totalInvestment],
          ['মোট ব্যয়',s.totalLoanGiven+s.totalExpense+s.totalInvestment],['',''],
          ['হাতে নগদ',cash],['ব্যাংক ব্যালেন্স',s.totalBankDeposit-s.totalBankWithdraw],
          ['বকেয়া ঋণ',s.totalLoanGiven-s.totalLoanReturned],['অনাদায়ী বিনিয়োগ',s.outstandingInv||0],
          ['সর্বমোট সম্পদ',cash+(s.totalBankDeposit-s.totalBankWithdraw)+(s.totalLoanGiven-s.totalLoanReturned)+(s.outstandingInv||0)]
        ];
        _downloadCSVFile(rows,`balance-sheet-${now}.csv`);break;
      }

      case 'allMembers': {
        const [members,fees,loans]=await Promise.all([FB.list('members','_id').catch(()=>[]),FB.list('fees').catch(()=>[]),FB.list('loans').catch(()=>[])]);
        const feeGroups={};fees.forEach(f=>{const mid=String(f.memberId||'');if(mid)(feeGroups[mid] ||= []).push(f)});
        const mp={};members.forEach(m=>{const bal=calcFeeBalance(feeGroups[String(m.id||'')]||[]);mp[m.id]={id:m.id,name:m.name||'-',j:bal.jama,b:bal.bokaya,w:bal.uttolan,lg:0,lr:0}});
        loans.forEach(l=>{const r=mp[l.memberId];if(!r)return;if(l.type==='প্রদান')r.lg+=+l.amount||0;else r.lr+=+l.amount||0});
        const hdr=['ক্রমিক','আইডি','নাম','বর্তমান জমা','বকেয়া','উত্তোলন','চলমান ঋণ'];
        const rows=[hdr,...Object.values(mp).map((r,i)=>[i+1,r.id,r.name,r.j-r.w,r.b,r.w,r.lg-r.lr])];
        _downloadCSVFile(rows,`all-members-${now}.csv`);break;
      }

      case 'fee': {
        const fees=await FB.list('fees').catch(()=>[]);
        const members=await FB.list('members','_id').catch(()=>[]);
        const memMap={};members.forEach(m=>memMap[m.id]=m);
        fees.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        const hdr=['ক্রমিক','তারিখ','সদস্যের নাম','আইডি','ধরণ','পরিমাণ (৳)','বিবরণ'];
        const rows=[hdr,...fees.map((f,i)=>[i+1,f.date||dateStr(f.timestamp),memMap[f.memberId]?.name||f.memberName||f.memberId||'-',f.memberId||'-',f.type||'-',+f.amount||0,f.note||''])];
        _downloadCSVFile(rows,`fee-report-${now}.csv`);break;
      }

      case 'memberFee': {
        const sel = S.frMember;
        if(!sel){ showL(false); toast('আগে একজন সদস্য বাছাই করুন','err'); return; }
        const [fees, loans] = await Promise.all([
          FB.listWhere('fees','memberId',sel.id).catch(()=>[]),
          FB.listWhere('loans','memberId',sel.id).catch(()=>[])
        ]);
        const tx = [
          ...fees.map(f=>({_cat:'ফি', date:f.date||dateStr(f.timestamp), type:f.type||'-', amount:+f.amount||0, note:f.note||''})),
          ...loans.map(l=>({_cat:'ঋণ', date:l.date||dateStr(l.timestamp), type:'ঋণ '+(l.type||''), amount:+l.amount||0, note:l.note||''}))
        ].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        const hdr=['ক্রমিক','তারিখ','ক্যাটাগরি','ধরন','পরিমাণ (৳)','বিবরণ'];
        const rows=[
          ['সদস্যের নাম', sel.name||'-'],
          ['আইডি', sel.id||'-'],
          [],
          hdr,
          ...tx.map((t,i)=>[i+1,t.date,t._cat,t.type,t.amount,t.note])
        ];
        _downloadCSVFile(rows,`member-fee-${esc(sel.id||'')}-${now}.csv`);break;
      }



      case 'income': {
        const list=await FB.list('incomeExpense').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        const hdr=['ক্রমিক','তারিখ','ধরণ','ক্যাটাগরি','পরিমাণ (৳)','বিবরণ'];
        const rows=[hdr,...list.map((x,i)=>[i+1,x.date||dateStr(x.timestamp),x.type||'-',x.category||'-',+x.amount||0,x.note||''])];
        _downloadCSVFile(rows,`income-expense-${now}.csv`);break;
      }

      case 'loan': {
        const [members,loans]=await Promise.all([FB.list('members','_id').catch(()=>[]),FB.list('loans').catch(()=>[])]);
        const memMap={};members.forEach(m=>memMap[m.id]=m);
        loans.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        const hdr=['ক্রমিক','তারিখ','সদস্যের নাম','আইডি','ধরণ','পরিমাণ (৳)','সুদ (%)','বিবরণ'];
        const rows=[hdr,...loans.map((l,i)=>[i+1,l.date||dateStr(l.timestamp),memMap[l.memberId]?.name||l.memberName||l.memberId||'-',l.memberId||'-',l.type||'-',+l.amount||0,l.interest||0,l.note||''])];
        _downloadCSVFile(rows,`loan-report-${now}.csv`);break;
      }

      case 'investment': {
        const list=await FB.list('investments').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        const hdr=['ক্রমিক','তারিখ','প্রকল্প','ধরণ','পরিমাণ (৳)','বিবরণ'];
        const rows=[hdr,...list.map((x,i)=>[i+1,x.date||dateStr(x.timestamp),x.title||'-',invType(x)==='out'?'বিনিয়োগ':'ফেরত',+x.amount||0,x.note||''])];
        _downloadCSVFile(rows,`investment-report-${now}.csv`);break;
      }

      case 'bank': {
        const list=await FB.list('bank').catch(()=>[]);
        list.sort((a,b)=>((b.date||'')+'').localeCompare((a.date||'')+''));
        const hdr=['ক্রমিক','তারিখ','ব্যাংক','A/C নম্বর','ধরণ','পরিমাণ (৳)','বিবরণ'];
        const rows=[hdr,...list.map((x,i)=>[i+1,x.date||dateStr(x.timestamp),x.bankName||'-',x.accountNo||'-',x.type||'-',+x.amount||0,x.note||''])];
        _downloadCSVFile(rows,`bank-report-${now}.csv`);break;
      }

      case 'txFilter': {
        const map=window._txfMap||{};
        const txRows=Object.values(map).sort((a,b)=>(b._date||'').localeCompare(a._date||''));
        const catBadge=c=>({fees:'ফি',incomeExpense:'আয়/ব্যয়',loans:'ঋণ',investments:'বিনিয়োগ',bank:'ব্যাংক'}[c]||c);
        const hdr=['ক্রমিক','তারিখ','ক্যাটাগরি','বিবরণ','সদস্য/তথ্য','ধরণ','পরিমাণ (৳)'];
        const rows=[hdr,...txRows.map((r,i)=>[i+1,dateStr(r._date),catBadge(r._cat),r._label,r._sub||'',r._in?'জমা/আয়':'ব্যয়/উত্তোলন',r._amt])];
        _downloadCSVFile(rows,`tx-filter-${now}.csv`);break;
      }

      case 'monthlyTracker': {
        const bnMonths=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
        const selYear=S.mftYear||new Date().getFullYear();
        const selMonthIdx=S.mftMonth?parseInt(S.mftMonth)-1:-1;
        const showMonths=selMonthIdx>=0?[selMonthIdx]:Array.from({length:12},(_,i)=>i);
        const [members,allFees]=await Promise.all([FB.list('members','name').catch(()=>[]),FB.list('fees').catch(()=>[])]);
        const jamaFees=allFees.filter(f=>{if(f.type!=='জমা')return false;const d=f.date?new Date(f.date):(f.timestamp?.toDate?f.timestamp.toDate():null);return d&&d.getFullYear()===parseInt(selYear);});
        const paid={};jamaFees.forEach(f=>{const mid=String(f.memberId||'');if(!mid)return;const d=f.date?new Date(f.date):f.timestamp?.toDate?.();if(!d)return;const m=d.getMonth();if(!paid[mid])paid[mid]={};paid[mid][m]=(paid[mid][m]||0)+(+f.amount||0);});
        const hdr=['ক্রমিক','নাম','আইডি',...showMonths.map(i=>bnMonths[i]),'মোট জমা','অগ্রগতি (%)'];
        const rows=[hdr,...members.map((mem,i)=>{const mid=String(mem.id||'');const cells=showMonths.map(mi=>paid[mid]?.[mi]||'');const tot=showMonths.reduce((s,mi)=>s+(paid[mid]?.[mi]||0),0);const pc=Math.round(showMonths.filter(mi=>paid[mid]?.[mi]).length/showMonths.length*100);return[i+1,mem.name||'-',mem.id||'-',...cells,tot,pc+'%'];})];
        _downloadCSVFile(rows,`monthly-tracker-${selYear}.csv`);break;
      }

      default: showL(false); toast('অজানা রিপোর্ট','err'); return;
    }
    showL(false);
  }catch(e){ showL(false); toast('CSV তৈরিতে সমস্যা: '+(e.message||e),'err'); }
}

/* ━━━ OFFLINE MONITOR ━━━ */
function updateOfflineBar(){
  const bar = document.getElementById('offlineBar');
  const icon = document.getElementById('offlineIcon');
  const msg = document.getElementById('offlineMsg');
  if(!bar) return;
  if(!navigator.onLine){
    bar.classList.remove('online');
    if(icon) icon.textContent = '📡';
    if(msg) msg.textContent = 'ইন্টারনেট সংযোগ নেই — অফলাইন মোডে চলছে (cached ডেটা দেখাচ্ছে)';
    bar.classList.add('show');
  } else {
    bar.classList.add('online');
    if(icon) icon.textContent = '✅';
    if(msg) msg.textContent = 'ইন্টারনেট সংযোগ পুনরায় পাওয়া গেছে!';
    bar.classList.add('show');
    setTimeout(()=>{ bar.classList.remove('show','online'); }, 3000);
  }
}
window.addEventListener('online',  updateOfflineBar);
window.addEventListener('offline', updateOfflineBar);

/* ━━━ INIT ━━━ */
window.onload = async ()=>{
  showL(true);
  // Session auto-restore বন্ধ — প্রতিবার লগইন করতে হবে
  try{ localStorage.removeItem('somiti_session'); }catch(e){}
  try{ sessionStorage.removeItem('somiti_next_page'); }catch(e){}
  // Load settings (works offline if cached by Firestore persistence)
  try{ S.settings = await FB.getSettings(); }catch(e){}
  showL(false);
  render();
  // Show offline bar if already offline on load
  if(!navigator.onLine) updateOfflineBar();
};
</script>
