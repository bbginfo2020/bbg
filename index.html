<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>সমিতি ম্যানেজমেন্ট সিস্টেম</title>
<style>
@font-face{
  font-family:'SolaimanLipi';
  src:url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/SolaimanLipi/SolaimanLipi.woff2') format('woff2'),
      url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/SolaimanLipi/SolaimanLipi.woff') format('woff'),
      url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/SolaimanLipi/SolaimanLipi.ttf') format('truetype');
  font-weight:normal;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'Nikosh';
  src:url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/Nikosh/Nikosh.woff2') format('woff2'),
      url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/Nikosh/Nikosh.woff') format('woff'),
      url('https://cdn.jsdelivr.net/gh/maateen/bangla-web-fonts/fonts/Nikosh/Nikosh.ttf') format('truetype');
  font-weight:normal;font-style:normal;font-display:swap;
}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-check-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --p:#1565C0;--pd:#0D47A1;--pl:#1976D2;--pll:#42A5F5;
  --s:#00897B;--sd:#00695C;
  --warn:#E65100;--danger:#C62828;--ok:#2E7D32;--ok2:#43A047;
  --bank:#4527A0;--bankl:#7B1FA2;--inv:#AD1457;
  --bg:#EEF2FF;--bg2:#F8FAFF;--t1:#1A1A2E;--t2:#55557A;--t3:#9999BB;
  --bdr:#E0E7FF;--bdr2:#D1D9FF;
  --sh:0 2px 12px rgba(21,101,192,.08);
  --shm:0 4px 24px rgba(21,101,192,.15);
  --shl:0 8px 40px rgba(0,0,0,.18);
  --r:14px;--rs:9px;--rl:22px;--tr:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'SolaimanLipi','Hind Siliguri','Nikosh',sans-serif !important}
html,body{overflow-x:hidden;font-family:'SolaimanLipi','Hind Siliguri','Nikosh',sans-serif !important}
body{background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;line-height:1.7}
button,input,select,textarea,h1,h2,h3,h4,h5,h6,p,span,div,a,label,th,td{font-family:'SolaimanLipi','Hind Siliguri','Nikosh',sans-serif !important}
img{max-width:100%}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--pd),var(--pl));color:#fff;padding:0 15px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.22)}
.hdr-in{display:flex;align-items:center;min-height:64px;max-width:980px;margin:0 auto;gap:9px}
.hdr-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.35);flex-shrink:0}
.hdr-logo-ph{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;border:2px solid rgba(255,255,255,.22)}
.hdr-info{flex:1;min-width:0;line-height:1.25}
.hdr-name{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-sub{font-size:11px;opacity:.82;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-meta{font-size:10.5px;opacity:.78;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.scroll-mq{background:linear-gradient(90deg,#fef3c7,#fde68a);color:#7c2d12;border-bottom:1px solid #f59e0b;overflow:hidden;position:sticky;top:64px;z-index:99;font-size:13px;font-weight:600;padding:8px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.scroll-mq-inner{display:inline-block;white-space:nowrap;padding-left:100%;animation:scroll-mq 35s linear infinite}
.scroll-mq-inner span{margin:0 30px;display:inline-block}
.scroll-mq-inner span::before{content:'📢 ';margin-right:6px}
@keyframes scroll-mq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.back-btn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.hdr-logout{width:38px;height:38px;border-radius:50%;border:none;background:rgba(220,38,38,.85);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:background .2s}
.hdr-logout:hover{background:rgba(220,38,38,1)}
.rtbl{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
.rtbl th,.rtbl td{padding:9px 8px;border-bottom:1px solid var(--bdr);text-align:center;white-space:nowrap}
.rtbl thead th{background:linear-gradient(135deg,var(--pd),var(--pl));color:#fff;font-weight:700;font-size:12px;position:sticky;top:0}
.rtbl tbody tr:nth-child(even){background:rgba(0,0,0,.02)}
.rtbl tbody tr:hover{background:rgba(25,118,210,.06)}
.rtbl td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.rtbl tfoot td{background:rgba(0,0,0,.04);border-top:2px solid var(--pd)}
.mwrap{position:relative}
.mbtn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;font-size:20px}
.mdd{position:absolute;top:calc(100% + 7px);right:0;background:#fff;border-radius:var(--r);box-shadow:var(--shl);min-width:240px;max-height:80vh;overflow-y:auto;z-index:300;animation:sD .16s ease}
@keyframes sD{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
.mitem{display:flex;align-items:center;gap:11px;padding:12px 17px;color:var(--t1);cursor:pointer;transition:var(--tr);font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.mitem:hover{background:#EEF3FF;color:var(--p)}
.mdiv{height:1px;background:var(--bdr)}

/* LAYOUT */
.main{max-width:980px;margin:0 auto;padding:18px 14px 90px}
.pg-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--pd)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:13px}
.ch{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct{font-size:14.5px;font-weight:700;color:var(--t1)}
.cb{padding:16px 18px}

/* STAT CARDS */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:16px}
@media(min-width:640px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.scard{position:relative;background:#fff;border-radius:18px;padding:16px;box-shadow:0 4px 18px rgba(21,101,192,.08);display:flex;flex-direction:column;gap:10px;overflow:hidden;transition:var(--tr);border:1px solid var(--bdr)}
.scard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pl),var(--p));opacity:.04;z-index:0}
.scard::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--pl),var(--p));opacity:.08;z-index:0}
.scard>*{position:relative;z-index:1}
.scard:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(21,101,192,.18)}
.scard.green::before,.scard.green::after{background:linear-gradient(135deg,var(--ok2),var(--ok))}
.scard.red::before,.scard.red::after{background:linear-gradient(135deg,#EF5350,var(--danger))}
.scard.orange::before,.scard.orange::after{background:linear-gradient(135deg,#FB8C00,var(--warn))}
.scard.purple::before,.scard.purple::after{background:linear-gradient(135deg,var(--bankl),var(--bank))}
.scard.pink::before,.scard.pink::after{background:linear-gradient(135deg,#EC407A,var(--inv))}
.scard.green::before,.scard.red::before,.scard.orange::before,.scard.purple::before,.scard.pink::before{opacity:.05}
.scard.green::after,.scard.red::after,.scard.orange::after,.scard.purple::after,.scard.pink::after{opacity:.1}
.s-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--pl),var(--p));display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;box-shadow:0 6px 14px rgba(21,101,192,.3)}
.scard.green .s-icon{background:linear-gradient(135deg,var(--ok2),var(--ok));box-shadow:0 6px 14px rgba(46,125,50,.3)}
.scard.red .s-icon{background:linear-gradient(135deg,#EF5350,var(--danger));box-shadow:0 6px 14px rgba(198,40,40,.3)}
.scard.orange .s-icon{background:linear-gradient(135deg,#FB8C00,var(--warn));box-shadow:0 6px 14px rgba(230,81,0,.3)}
.scard.purple .s-icon{background:linear-gradient(135deg,var(--bankl),var(--bank));box-shadow:0 6px 14px rgba(69,39,160,.3)}
.scard.pink .s-icon{background:linear-gradient(135deg,#EC407A,var(--inv));box-shadow:0 6px 14px rgba(173,20,87,.3)}
.sv{font-size:20px;font-weight:700;line-height:1.1;color:var(--t1);letter-spacing:-.3px}
.sl{font-size:12px;color:var(--t2);font-weight:500}
.s-trend{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(46,125,50,.12);color:var(--ok);width:fit-content}

.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:13px}
.dash-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:linear-gradient(135deg,var(--pd),var(--pl));color:#fff;border:none;border-radius:18px;padding:20px 12px;cursor:pointer;box-shadow:0 6px 20px rgba(21,101,192,.25);transition:var(--tr);width:100%;text-align:center;line-height:1.4}
.dash-action-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(21,101,192,.35)}
.dash-action-btn.fin{background:linear-gradient(135deg,var(--ok),var(--ok2));box-shadow:0 6px 20px rgba(46,125,50,.25)}
.dash-action-btn.fin:hover{box-shadow:0 10px 28px rgba(46,125,50,.35)}
@media(min-width:640px){.qgrid{grid-template-columns:repeat(6,1fr)}}
.qa{position:relative;background:#fff;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;box-shadow:var(--sh);border:1.5px solid var(--bdr);transition:var(--tr);font-size:12px;font-weight:600;color:var(--t1);overflow:hidden}
.qa::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pl),var(--p));opacity:0;transition:var(--tr);z-index:0}
.qa>*{position:relative;z-index:1}
.qa:hover{border-color:var(--p);transform:translateY(-4px);box-shadow:0 12px 24px rgba(21,101,192,.22);color:#fff}
.qa:hover::before{opacity:1}
.qa-ic{font-size:24px;margin-bottom:6px;display:block}

/* FORMS */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:6px}
.fi,.fsel,.fta{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:14px;color:var(--t1);background:#fff;transition:var(--tr);outline:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(21,101,192,.1)}
.fta{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.frow{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:var(--tr)}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shm)}
.btn-p{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff}
.btn-s{background:linear-gradient(135deg,var(--sd),var(--s));color:#fff}
.btn-d{background:linear-gradient(135deg,#B71C1C,var(--danger));color:#fff}
.btn-w{background:linear-gradient(135deg,#EF6C00,var(--warn));color:#fff}
.btn-blk{width:100%}
.btn-sec{background:#fff;color:var(--t1);border:1.5px solid var(--bdr)}
.btn-sm{padding:7px 12px;font-size:12px}

/* MEMBER SETTINGS */
.set-wrap{max-width:640px;margin:0 auto;padding-bottom:20px}
.set-hero{background:linear-gradient(135deg,#0D47A1,#1565C0 55%,#00897B);border-radius:var(--rl);padding:26px 22px;color:#fff;box-shadow:0 12px 32px rgba(13,71,161,.28);margin-bottom:16px;position:relative;overflow:hidden}
.set-hero::before{content:'';position:absolute;inset:-60% -30% auto -30%;height:220%;background:radial-gradient(ellipse at center,rgba(255,255,255,.16),transparent 60%);animation:lgShine 6s ease-in-out infinite}
.set-hero-inner{position:relative;display:flex;align-items:center;gap:16px}
.set-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;border:3px solid rgba(255,255,255,.35);backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.set-hero h2{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px}
.set-hero p{margin:4px 0 0;font-size:13px;opacity:.92;line-height:1.4}
.set-card{background:#fff;border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;border:1px solid var(--bdr)}
.set-card-hd{padding:16px 20px;border-bottom:1.5px solid var(--bdr);display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#F8FAFF,#fff)}
.set-card-hd .set-icn{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--pl),var(--p));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,.25);flex-shrink:0}
.set-card-hd h3{margin:0;font-size:15px;font-weight:700;color:var(--t1);letter-spacing:.3px}
.set-card-bd{padding:20px}
.set-row{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1.5px dashed #cbd5e1;border-radius:var(--r);padding:16px 18px}
.set-pw-box{flex:1;min-width:0}
.set-pw-box .set-lbl{font-size:11.5px;color:#64748b;margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.set-pw-val{font-family:'JetBrains Mono','Fira Code',monospace;font-size:22px;font-weight:700;color:#dc2626;letter-spacing:3px;text-shadow:0 1px 2px rgba(220,38,38,.1)}
.set-pw-val.plain{font-size:20px;letter-spacing:1px;color:#0f172a}
.set-pw-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rs);border:none;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);box-shadow:0 4px 12px rgba(15,23,42,.25)}
.set-pw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.35)}
.set-hint{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#64748b;margin-top:12px;padding:10px 14px;background:#fef3c7;border-radius:10px;border-left:3px solid #f59e0b}
.set-hint svg,.set-hint span:first-child{font-size:16px;flex-shrink:0}
.set-form .fg{margin-bottom:14px}
.set-form label{display:block;font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:7px}
.set-form .fi{width:100%;padding:13px 15px;border:2px solid var(--bdr);border-radius:12px;font-size:14.5px;color:var(--t1);background:#fff;transition:var(--tr);outline:none}
.set-form .fi:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(21,101,192,.1)}
.set-form .fi::placeholder{color:#94a3b8}
.set-submit{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--ok),var(--ok2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:var(--tr);box-shadow:0 6px 20px rgba(46,125,50,.25);display:flex;align-items:center;justify-content:center;gap:8px}
.set-submit:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(46,125,50,.35)}
.set-submit:active{transform:scale(.98)}
.set-stat{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.set-stat-item{font-size:11px;color:#64748b;background:#f1f5f9;padding:4px 10px;border-radius:8px;font-weight:600}

/* ━━━ MEMBER FINANCIAL TRACKER ━━━ */
.mft-summary-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.mft-summary-bar{grid-template-columns:repeat(4,1fr)}}
.mft-scard{background:#fff;border:1px solid var(--bdr);border-radius:14px;padding:13px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.mft-scard .v{font-size:17px;font-weight:800;color:var(--pd);line-height:1.1}
.mft-scard .l{font-size:11px;color:var(--t2);margin-top:3px;font-weight:500}
.mft-scard.g .v{color:var(--ok)} .mft-scard.r .v{color:var(--danger)} .mft-scard.o .v{color:var(--warn)}
.mft-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mft-filter input,.mft-filter select{flex:1;min-width:120px;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;background:#fff;outline:none;transition:border-color .2s}
.mft-filter input:focus,.mft-filter select:focus{border-color:var(--p)}
.mft-sort-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mft-sort-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--t2);transition:var(--tr)}
.mft-sort-btn.on{background:var(--pd);color:#fff;border-color:var(--pd)}
.mft-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:600px){.mft-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.mft-grid{grid-template-columns:repeat(3,1fr)}}
.mft-card{background:#fff;border:1.5px solid var(--bdr);border-radius:16px;padding:0;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:var(--tr);cursor:pointer}
.mft-card:hover{border-color:var(--p);box-shadow:0 6px 22px rgba(21,101,192,.12);transform:translateY(-2px)}
.mft-card-hd{padding:13px 15px 10px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--bdr)}
.mft-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pd),var(--pl));color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.mft-name{font-weight:700;font-size:14px;color:var(--t1);line-height:1.2}
.mft-id{font-size:11px;color:var(--t3);margin-top:1px}
.mft-status{margin-left:auto;flex-shrink:0}
.mft-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.mft-badge.ok{background:#dcfce7;color:#15803d}
.mft-badge.warn{background:#fef3c7;color:#92400e}
.mft-badge.bad{background:#fee2e2;color:#b91c1c}
.mft-card-bd{padding:11px 15px}
.mft-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed var(--bdr)}
.mft-row:last-child{border-bottom:none}
.mft-row .lbl{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px}
.mft-row .val{font-size:13px;font-weight:700}
.mft-row .val.g{color:var(--ok)} .mft-row .val.r{color:var(--danger)} .mft-row .val.b{color:var(--pd)}
.mft-bar-wrap{height:6px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin-top:9px}
.mft-bar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.mft-detail-bg{position:fixed;inset:0;background:rgba(10,20,50,.5);z-index:400;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.mft-detail-bg.on{opacity:1;pointer-events:all}
.mft-detail{background:#fff;border-radius:22px 22px 0 0;padding:0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.28,1)}
.mft-detail-bg.on .mft-detail{transform:translateY(0)}
.mft-detail-hd{padding:18px 18px 14px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:#fff;z-index:2;display:flex;align-items:center;gap:12px}
.mft-detail-bd{padding:14px 16px 28px}
.mft-tx-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.mft-tx-row:last-child{border-bottom:none}
.mft-tx-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.mft-tx-ic.in{background:#dcfce7} .mft-tx-ic.out{background:#fee2e2} .mft-tx-ic.loan{background:#dbeafe}
.mft-empty{text-align:center;padding:30px 20px;color:var(--t3);font-size:13px}


/* ━━━ DOWNLOAD / REPORT BAR ━━━ */
.dl-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dl-bar .pg-title{margin:0;flex:1;min-width:0}
.dl-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--rs);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);white-space:nowrap}
.dl-btn:hover{transform:translateY(-1px);box-shadow:var(--shm)}
.dl-pdf{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff}
.dl-csv{background:linear-gradient(135deg,#1b5e20,#388e3c);color:#fff}
.dl-modal-bg{position:fixed;inset:0;background:rgba(10,20,50,.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.dl-modal-bg.on{opacity:1;pointer-events:all}
.dl-modal{background:#fff;border-radius:22px 22px 0 0;padding:22px 20px 32px;width:100%;max-width:500px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.28,1)}
.dl-modal-bg.on .dl-modal{transform:translateY(0)}
.dl-modal-title{font-size:16px;font-weight:800;color:var(--pd);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dl-opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.dl-opt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--bdr);background:#fff;cursor:pointer;transition:var(--tr);font-size:13px;font-weight:700;color:var(--t1);text-align:center}
.dl-opt:hover{border-color:var(--p);background:#eef3ff;color:var(--pd);transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,101,192,.14)}
.dl-opt .ic{font-size:28px}
.dl-opt.pdf{border-color:#ef9a9a}.dl-opt.pdf:hover{border-color:#e53935;background:#fff5f5;color:#b71c1c}
.dl-opt.csv{border-color:#a5d6a7}.dl-opt.csv:hover{border-color:#388e3c;background:#f1fff3;color:#1b5e20}
.dl-opt.print{border-color:#90caf9}.dl-opt.print:hover{border-color:#1976d2;background:#e3f2fd;color:#0d47a1}
.dl-cancel{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--bdr);background:#f8faff;color:var(--t2);font-weight:700;font-size:14px;cursor:pointer;margin-top:12px;transition:var(--tr)}
.dl-cancel:hover{background:#e8f0fe;color:var(--pd)}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0D47A1 0%,#1565C0 48%,#00695C 100%);padding:20px}
.lc{background:#fff;border-radius:var(--rl);padding:32px 26px;width:100%;max-width:420px;box-shadow:var(--shl)}
.l-logo{text-align:center;margin-bottom:18px}
.l-logo-img{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--pd),var(--s));display:inline-flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:10px}
.l-title{font-size:20px;font-weight:700;color:var(--pd);text-align:center}
.l-sub{font-size:12px;color:var(--t2);text-align:center;margin-bottom:18px}
.rtabs{display:flex;background:var(--bg);border-radius:var(--rs);padding:4px;margin-bottom:18px}
.rtab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:13.5px;border:none;background:none;font-weight:500;color:var(--t2)}
.rtab.on{background:#fff;color:var(--p);box-shadow:var(--sh);font-weight:700}

/* PRO LOGIN */
.lg-wrap{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;background:linear-gradient(135deg,#061a40 0%,#0a3a8c 45%,#003d3a 100%)}
.lg-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.lg-orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;animation:lgFloat 14s ease-in-out infinite}
.lg-orb1{width:340px;height:340px;background:radial-gradient(circle,#2196F3,transparent 70%);top:-80px;left:-80px}
.lg-orb2{width:380px;height:380px;background:radial-gradient(circle,#00BFA5,transparent 70%);bottom:-100px;right:-90px;animation-delay:-5s}
.lg-orb3{width:260px;height:260px;background:radial-gradient(circle,#7C4DFF,transparent 70%);top:40%;left:55%;animation-delay:-9s}
@keyframes lgFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.08)}66%{transform:translate(-30px,40px) scale(.95)}}
.lg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%)}
.lg-card{position:relative;width:100%;max-width:430px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.2);overflow:hidden;animation:lgIn .7s cubic-bezier(.2,.9,.3,1.2) both}
@keyframes lgIn{from{opacity:0;transform:translateY(40px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.lg-head{background:linear-gradient(135deg,#0D47A1,#1976D2 55%,#00897B);color:#fff;padding:28px 22px 22px;text-align:center;position:relative;overflow:hidden}
.lg-head::before{content:'';position:absolute;inset:-50% -20% auto -20%;height:200%;background:radial-gradient(ellipse at center,rgba(255,255,255,.18),transparent 60%);animation:lgShine 6s ease-in-out infinite}
@keyframes lgShine{0%,100%{transform:translateY(0)}50%{transform:translateY(20%)}}
.lg-logo-ring{position:relative;width:92px;height:92px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.lg-logo-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,.55);animation:lgPulse 2.4s ease-out infinite}
.lg-logo-pulse::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);animation:lgPulse 2.4s ease-out infinite;animation-delay:.6s}
@keyframes lgPulse{0%{transform:scale(.85);opacity:.9}100%{transform:scale(1.35);opacity:0}}
.lg-logo-img,.lg-logo-fb{position:relative;width:76px;height:76px;border-radius:50%;object-fit:cover;background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:34px;color:#0D47A1;z-index:1;animation:lgFloat2 4s ease-in-out infinite}
@keyframes lgFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.lg-title{font-size:21px;font-weight:800;letter-spacing:.2px;text-shadow:0 2px 8px rgba(0,0,0,.25);position:relative}
.lg-meta{display:flex;flex-direction:column;gap:4px;margin-top:10px;font-size:12.5px;color:rgba(255,255,255,.92);position:relative}
.lg-meta-row{display:flex;align-items:center;justify-content:center;gap:6px}
.lg-body{padding:24px 22px 22px}
.lg-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:16px;font-weight:500}
.lg-tabs,.lg-fg{animation:lgUp .5s ease-out both}
.lg-fg:nth-of-type(1){animation-delay:.15s}
.lg-fg:nth-of-type(2){animation-delay:.25s}
.lg-tabs{animation-delay:.05s}
.lg-btn{animation:lgUp .5s ease-out .35s both;background:linear-gradient(135deg,#0D47A1,#1976D2 60%,#00897B)!important;font-size:15px;padding:13px;letter-spacing:.3px;position:relative;overflow:hidden}
.lg-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transition:none}
.lg-btn:hover::after{animation:lgSweep .8s ease}
@keyframes lgSweep{to{left:140%}}
@keyframes lgUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lg-card .fi{transition:border-color .2s,box-shadow .2s}
.lg-card .fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(33,150,243,.15);outline:none}



/* LOADER & TOAST */
#loader{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spin{width:38px;height:38px;border:4px solid #E0E7FF;border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a2e;color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;z-index:9999;transition:all .3s;max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--ok)}
#toast.err{background:var(--danger)}

/* MEMBER ROW */
.mrow{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:var(--tr)}
.mrow:hover{background:var(--bg2)}
.mrow:last-child{border-bottom:none}
.mav{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pl),var(--p));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex-shrink:0;font-size:16px}
.mmn{font-weight:700;font-size:14px;color:var(--t1)}
.mmm{font-size:11.5px;color:var(--t2)}
.m-act{display:flex;gap:5px}
.m-act button{width:30px;height:30px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:var(--bg)}

/* TRANSACTION ROW */
.trow{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--bdr)}
.trow:last-child{border-bottom:none}
.t-ic{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.t-ic.in{background:#E8F5E9;color:var(--ok)}
.t-ic.out{background:#FFEBEE;color:var(--danger)}
.t-info{flex:1;min-width:0}
.t-title{font-size:13.5px;font-weight:600;color:var(--t1)}
.t-date{font-size:11px;color:var(--t2)}
.t-amt{font-weight:700;font-size:14px}
.t-amt.in{color:var(--ok)}
.t-amt.out{color:var(--danger)}

/* BALANCE SHEET */
.bs-section{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:13px}
.bs-hdr{padding:13px 18px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--pd),var(--p));font-size:14px}
.bs-hdr.green{background:linear-gradient(135deg,#1B5E20,var(--ok))}
.bs-hdr.red{background:linear-gradient(135deg,#B71C1C,var(--danger))}
.bs-hdr.purple{background:linear-gradient(135deg,#311B92,var(--bank))}
.bs-body{padding:8px 18px}
.bs-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--bdr);font-size:13.5px}
.bs-row:last-child{border-bottom:none}
.bs-row .amt{font-weight:700}
.bs-total{background:linear-gradient(135deg,#f0f4ff,#e8efff);padding:14px 18px;display:flex;justify-content:space-between;font-weight:700;font-size:15px;color:var(--pd);border-top:2px solid var(--p)}

/* TABS */
.tabs{display:flex;background:#fff;border-radius:var(--rs);padding:4px;margin-bottom:13px;box-shadow:var(--sh);overflow-x:auto}
.tab{flex:1;min-width:90px;padding:9px 12px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;border:none;background:none;font-weight:500;color:var(--t2);white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;font-weight:700}

/* SEARCH */
.search-box{position:relative;margin-bottom:13px}
.search-box input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:14px;outline:none}
.search-box::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:5000;display:flex;align-items:center;justify-content:center;padding:15px;animation:sD .2s ease}
.modal{background:#fff;border-radius:var(--rl);max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shl)}
.modal-hdr{padding:15px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-ti{font-size:16px;font-weight:700;color:var(--pd)}
.x-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t2);line-height:1}
.modal-bd{padding:20px}

/* PRETTY EDIT MODAL */
.emo-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);z-index:6000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .25s}
.emo-bg.on{opacity:1}
.emo{background:#fff;border-radius:22px;max-width:440px;width:100%;max-height:92vh;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.35);transform:scale(.92) translateY(10px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column}
.emo-bg.on .emo{transform:scale(1) translateY(0)}
.emo-hd{padding:22px 22px 16px;background:linear-gradient(135deg,#0D47A1,#1976D2 60%,#00897B);color:#fff;position:relative}
.emo-hd.danger{background:linear-gradient(135deg,#B91C1C,#DC2626 60%,#F59E0B)}
.emo-hd.success{background:linear-gradient(135deg,#065F46,#10B981 60%,#34D399)}
.emo-ic{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px;backdrop-filter:blur(6px)}
.emo-ti{font-size:18px;font-weight:700;line-height:1.3}
.emo-sub{font-size:12.5px;opacity:.9;margin-top:3px}
.emo-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;width:32px;height:32px;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.emo-x:hover{background:rgba(255,255,255,.35);transform:rotate(90deg)}
.emo-bd{padding:20px 22px;overflow-y:auto;flex:1}
.emo-mb{background:linear-gradient(135deg,#F8FAFC,#EEF2FF);border:1px solid #E0E7FF;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.emo-mb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1976D2,#00897B);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.emo-mb-info{flex:1;min-width:0}
.emo-mb-n{font-weight:700;font-size:14px;color:var(--t1)}
.emo-mb-i{font-size:11.5px;color:var(--t2)}
.emo-fg{margin-bottom:13px}
.emo-fg label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.emo-fg .emo-in,.emo-fg select.emo-in{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;outline:none;transition:var(--tr);color:var(--t1)}
.emo-fg .emo-in:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(25,118,210,.12)}
.emo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.emo-ft{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;gap:10px;background:#F8FAFC}
.emo-btn{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:var(--tr);font-family:inherit}
.emo-btn.c{background:#fff;color:var(--t2);border:1.5px solid var(--bdr)}
.emo-btn.c:hover{background:#F1F5F9}
.emo-btn.p{background:linear-gradient(135deg,#1976D2,#00897B);color:#fff;box-shadow:0 4px 12px rgba(25,118,210,.3)}
.emo-btn.p:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(25,118,210,.4)}
.emo-btn.d{background:linear-gradient(135deg,#DC2626,#EF4444);color:#fff}
.emo-tabs{display:flex;gap:6px;background:#F1F5F9;padding:4px;border-radius:10px;margin-bottom:13px}
.emo-tab{flex:1;padding:9px;border:none;background:none;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;color:var(--t2);transition:var(--tr);font-family:inherit}
.emo-tab.on{background:#fff;color:var(--pd);box-shadow:0 2px 6px rgba(0,0,0,.08)}
@media (max-width:520px){
  .emo-bg{padding:8px;align-items:flex-end}
  .emo{max-width:100%;max-height:96vh;border-radius:18px 18px 14px 14px}
  .emo-hd{padding:16px 16px 12px}
  .emo-ic{width:44px;height:44px;font-size:22px;border-radius:13px;margin-bottom:6px}
  .emo-ti{font-size:16px}
  .emo-sub{font-size:11.5px}
  .emo-bd{padding:14px 16px}
  .emo-ft{padding:11px 16px;gap:8px}
  .emo-fg{margin-bottom:10px}
  .emo-fg label{font-size:11px;margin-bottom:4px}
  .emo-fg .emo-in,.emo-fg select.emo-in{padding:10px 11px;font-size:13.5px;border-radius:9px}
  .emo-row{grid-template-columns:1fr;gap:0}
  .emo-btn{padding:11px;font-size:13.5px}
  .emo-tab{padding:8px;font-size:12.5px}
}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.g{background:#E8F5E9;color:var(--ok)}
.badge.r{background:#FFEBEE;color:var(--danger)}
.badge.b{background:#E3F2FD;color:var(--p)}
.badge.p{background:#F3E5F5;color:var(--bank)}

/* ━━━ BANK CONFIRMATION (ব্যাংক জমা নিশ্চিতকরণ) ━━━ */
.bc-hero{position:relative;background:linear-gradient(135deg,#0D47A1 0%,#1565C0 45%,#00897B 100%);color:#fff;border-radius:22px;padding:22px 24px;margin-bottom:16px;box-shadow:0 14px 40px rgba(13,71,161,.35);overflow:hidden;isolation:isolate}
.bc-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 85% 20%,rgba(255,255,255,.18) 0%,transparent 35%),radial-gradient(circle at 15% 85%,rgba(0,191,165,.25) 0%,transparent 40%);z-index:-1}
.bc-hero::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse at top right,#000 0%,transparent 70%);z-index:-1;opacity:.6}
.bc-hero-inner{position:relative;display:flex;align-items:center;gap:16px;z-index:1}
.bc-hero-ic{width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid rgba(255,255,255,.35);box-shadow:0 6px 18px rgba(0,0,0,.2);flex-shrink:0}
.bc-hero-info{flex:1;min-width:0}
.bc-hero-ti{font-size:18px;font-weight:700;margin-bottom:2px;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.bc-hero-sub{font-size:12.5px;opacity:.92;line-height:1.4}
.bc-hero-amt{text-align:right;flex-shrink:0}

/* ━━━━━━━━ UTILS ━━━━━━━━ */
const fmt = n => '৳' + (Number(n)||0).toLocaleString('bn-BD');
const dateStr = (ts) => {
  if(!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('bn-BD', {day:'2-digit',month:'short',year:'numeric'});
};
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const safeVal = v => esc(v || '-');
const memberKey = m => String(m?.id || m?._id || '');

const txMillis = t => {
  const ts = t?.timestamp;
  if(ts?.toDate) return ts.toDate().getTime();
  if(typeof ts?.seconds === 'number') return ts.seconds * 1000 + Math.floor((ts.nanoseconds||0) / 1e6);
  const d = t?.date ? new Date(t.date).getTime() : 0;
  return Number.isFinite(d) ? d : 0;
};

function calcFeeBalance(fees=[]){
  let jama=0, uttolan=0, bokaya=0;
  [...fees].sort((a,b)=>txMillis(a)-txMillis(b)).forEach(f=>{
    const a = +f.amount || 0;
    if(f.type === 'জমা'){
      jama += a;
      bokaya = Math.max(0, bokaya - a);
    }else if(f.type === 'উত্তোলন'){
      uttolan += a;
    }else if(f.type === 'বকেয়া'){
      const autoAdjust = a < 0 && String(f.note||'').includes('জমা থেকে বকেয়া সমন্বয়');
      if(!autoAdjust) bokaya = Math.max(0, bokaya + a);
    }
  });
  return {jama, uttolan, bokaya, netJama: jama - uttolan};
}

function calcTotalBokaya(fees=[]){
  const byMember = {};
  fees.forEach(f=>{
    const mid = String(f.memberId||'');
    if(!mid) return;
    (byMember[mid] ||= []).push(f);
  });
  return Object.values(byMember).reduce((sum, list)=>sum + calcFeeBalance(list).bokaya, 0);
}
const normalizeMember = (m={}, fallbackId='') => ({...m, id:String(m.id || fallbackId || m._id || '')});

async function getMemberFull(idOrMember){
  const base = typeof idOrMember === 'object' ? normalizeMember(idOrMember) : {id:String(idOrMember||'')};
  const id = base.id || base._id;
  if(!id) return base;
  try{
    const doc = await db.collection('members').doc(id).get();
    if(doc.exists) return normalizeMember(doc.data(), doc.id);
  }catch(e){}
  return base;
}

function confirmAct(msg, opts={}){
  return new Promise(resolve=>{
    const title = opts.title || 'নিশ্চিত করুন';
    const icon = opts.icon || '🗑️';
    const okText = opts.okText || 'হ্যাঁ, ডিলিট করুন';
    const cancelText = opts.cancelText || 'বাতিল';
    const okClass = opts.okClass || '';
    const iconClass = opts.iconClass || '';
    const bodyHtml = opts.html ? opts.html : `<div class="cm-msg">${esc(msg)}</div>`;
    const existing = document.getElementById('cmOv');
    if(existing) existing.remove();
    const div = document.createElement('div');
    div.id = 'cmOv';
    div.className = 'cm-ov';
    div.innerHTML = `<div class="cm-box">
      <div class="cm-ic-wrap"><div class="cm-ic ${iconClass}">${icon}</div></div>
      <div class="cm-title">${esc(title)}</div>
      ${bodyHtml}
      <div class="cm-btns">
        <button class="cm-btn cancel" id="cmNo">${esc(cancelText)}</button>
        <button class="cm-btn confirm ${okClass}" id="cmYes">${esc(okText)}</button>
      </div>
    </div>`;
    document.body.appendChild(div);
    requestAnimationFrame(()=>div.classList.add('on'));
    const close = (val)=>{
      div.classList.remove('on');
      setTimeout(()=>{div.remove();resolve(val)},200);
    };
    div.querySelector('#cmYes').onclick=()=>close(true);
    div.querySelector('#cmNo').onclick=()=>close(false);
    div.onclick=(e)=>{if(e.target===div) close(false)};
  });
}

function nav(page, extra={}){
  if(S.page !== 'login' && S.page !== page) S.history.push(S.page);
  // Reset ALL transient/per-page state so every menu click opens a fresh page
  // (no leftover form data, filters, selections, or cached lists from previous work)
  S.viewing = null; S.viewingId = null; S.editing = null; S.lnMember = null;
  S.feeMember = null; S.feeSearch = ''; S.editingTx = null;
  S.tab = ''; S.cache = {}; S.pages = {};
  S.search = ''; S.mListQ = ''; S.modal = null;
  S.mftSearch = ''; S.mftSort = 'name'; S.mftFilter = 'all';
  window._mListCache = null;
  // Apply caller-supplied extras AFTER reset so intentional context (e.g. viewing a member) is preserved
  Object.assign(S, extra);
  S.page = page; S.sbOpen = false;
  window.scrollTo(0,0);
  try{ history.pushState({page, t:Date.now()}, '', '#'+page); }catch(e){}
  render();
}
function back(){
  // delegate to browser history so mobile back button and in-app back stay in sync
  if(S.history.length){ history.back(); }
}
window.addEventListener('popstate', async ()=>{
  // close confirm modal if open
  const cm = document.getElementById('cmOv');
  if(cm){ cm.remove(); try{history.pushState({page:S.page},'','#'+S.page)}catch(e){} return; }
  if(S.sbOpen){ S.sbOpen=false; document.getElementById('sb')?.classList.remove('on'); document.getElementById('sbOv')?.classList.remove('on'); try{history.pushState({page:S.page},'','#'+S.page)}catch(e){} return; }
  const dashPages = ['adminDash','memberDash'];
  if(dashPages.includes(S.page)){
    // On dashboards, mobile back triggers logout confirmation; if confirmed, exit app
    try{ history.pushState({page:S.page},'','#'+S.page); }catch(e){}
    const ok = await confirmAct('আপনি কি লগআউট করে অ্যাপ থেকে বের হতে চান?', {title:'লগআউট নিশ্চিতকরণ', icon:'🚪', okText:'লগআউট ও বের হোন', okClass:'danger'});
    if(ok){
      logout();
      // attempt to close the app/tab — works in PWA/standalone or window.open contexts
      try{ window.close(); }catch(e){}
      try{ if(window.navigator && window.navigator.app && window.navigator.app.exitApp) window.navigator.app.exitApp(); }catch(e){}
    }
    return;
  }
  if(S.history.length){
    const p = S.history.pop();
    S.page = p; S.sbOpen=false; S.modal=null;
    render();
  } else if(S.page !== 'login'){
    try{ history.pushState({page:S.page}, '', '#'+S.page); }catch(e){}
  }
});

/* ━━━━━━━━ FIREBASE OPS ━━━━━━━━ */
const FB = {
  async getSettings(){
    const d = await db.collection('config').doc('settings').get();
    return d.exists ? d.data() : S.settings;
  },
  async saveSettings(data){
    await db.collection('config').doc('settings').set(data, {merge:true});
  },
  async getAdmin(){
    const d = await db.collection('config').doc('admin').get();
    return d.exists ? d.data() : {id:'admin', password:'admin123'};
  },
  async login(id, pw, role){
    const email = `${id}@somiti.local`;
    try {
      // Firebase Auth দিয়ে sign in
      await auth.signInWithEmailAndPassword(email, pw);
    } catch(authErr) {
      // Firebase Auth fail হলে → নতুন user হতে পারে, Firestore থেকে verify করে create করি
      if(authErr.code === 'auth/user-not-found' || authErr.code === 'auth/invalid-credential' || authErr.code === 'auth/invalid-email'){
        // Firestore থেকে password check করে Firebase Auth account তৈরি করি
        let firestoreOk = false;
        if(role === 'admin'){
          const a = await this.getAdmin();
          if(a.id == id && a.password == pw) firestoreOk = true;
        } else {
          const d = await db.collection('members').doc(id).get();
          if(d.exists && d.data().password == pw) firestoreOk = true;
        }
        if(firestoreOk){
          try {
            await auth.createUserWithEmailAndPassword(email, pw);
          } catch(createErr) {
            if(createErr.code !== 'auth/email-already-in-use') {
              return {success:false, message:'Auth তৈরি ব্যর্থ: '+createErr.message};
            }
            // already exists — wrong password case
            return {success:false, message:'পাসওয়ার্ড ভুল'};
          }
        } else {
          return {success:false, message:'ভুল আইডি বা পাসওয়ার্ড'};
        }
      } else if(authErr.code === 'auth/wrong-password'){
        return {success:false, message:'পাসওয়ার্ড ভুল'};
      } else {
        return {success:false, message:'ভুল আইডি বা পাসওয়ার্ড'};
      }
    }
    // Auth সফল — Firestore থেকে user data নিই
    if(role === 'admin'){
      const a = await this.getAdmin();
      return {success:true, role:'admin', name:a.name||'অ্যাডমিন'};
    } else {
      const d = await db.collection('members').doc(id).get();
      if(!d.exists) return {success:false, message:'সদস্য পাওয়া যায়নি'};
      return {success:true, role:'member', member:d.data()};
    }
  },
  async list(coll, orderBy='timestamp'){
    try{
      const snap = await db.collection(coll).orderBy(orderBy,'desc').get();
      if(snap.size === 0){
        // fallback: orderBy field may not exist on docs → returns empty
        const all = await db.collection(coll).get();
        return all.docs.map(d=>({...d.data(), _id:d.id}));
      }
      return snap.docs.map(d=>({...d.data(), _id:d.id}));
    }catch(e){
      const snap = await db.collection(coll).get();
      return snap.docs.map(d=>({...d.data(), _id:d.id}));
    }
  },
  async listWhere(coll, field, val){
    const snap = await db.collection(coll).where(field,'==',val).get();
    return snap.docs.map(d=>({...d.data(), _id:d.id}));
  },
  async add(coll, data){
    const ref = db.collection(coll).doc();
    await ref.set({...data, _id:ref.id, timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    return ref.id;
  },
  async setDoc(coll, id, data){
    await db.collection(coll).doc(id).set({...data, timestamp:firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
  },
  async update(coll, id, data){
    await db.collection(coll).doc(id).set(data, {merge:true});
  },
  async del(coll, id){
    await db.collection(coll).doc(id).delete();
  },
  async summary(){
    const [f, l, ie, inv, b, m] = await Promise.all([
      db.collection('fees').get(),
      db.collection('loans').get(),
      db.collection('incomeExpense').get(),
      db.collection('investments').get(),
      db.collection('bank').get(),
      db.collection('members').get()
    ]);
    const sumT = (snap, type) => {
      let t=0; snap.forEach(d=>{if(d.data().type===type) t+=Number(d.data().amount||0)}); return t;
    };
    const sumAll = (snap) => {
      let t=0; snap.forEach(d=>{t+=Number(d.data().amount||0)}); return t;
    };
    return {
      memberCount: m.size,
      totalJama: sumT(f,'জমা'),
      totalBokaya: calcTotalBokaya(f.docs.map(d=>d.data())),
      totalLoanGiven: sumT(l,'প্রদান'),
      totalLoanReturned: sumT(l,'ফেরত'),
      totalIncome: sumT(ie,'আয়'),
      totalExpense: sumT(ie,'ব্যয়'),
      totalBankDeposit: sumT(b,'জমা'),
      totalBankWithdraw: sumT(b,'উত্তোলন'),
      totalInvestment: sumAll(inv),
      outstandingInv: sumAll(inv) - 2*sumT(inv,'in')
    };
  }
};

/* ━━━ BRUTE FORCE PROTECTION ━━━
   ৫ বার ভুল পাসওয়ার্ড → ৩০ মিনিট লক
   localStorage এ attempt count রাখা হয়
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const LOGIN_MAX_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS   = 30 * 60 * 1000; // ৩০ মিনিট

function getLockoutKey(role){ return 'somiti_lock_' + role; }

function checkLockout(role){
  try{
    const data = JSON.parse(localStorage.getItem(getLockoutKey(role)) || 'null');
    if(!data) return { locked:false, attempts:0 };
    const now = Date.now();
    if(data.lockedAt && now - data.lockedAt > LOGIN_LOCKOUT_MS){
      localStorage.removeItem(getLockoutKey(role));
      return { locked:false, attempts:0 };
    }
    if(data.lockedAt){
      const remaining = Math.ceil((LOGIN_LOCKOUT_MS - (now - data.lockedAt)) / 60000);
      return { locked:true, remaining };
    }
    return { locked:false, attempts: data.attempts||0 };
  }catch(e){ return { locked:false, attempts:0 }; }
}

function recordFailedAttempt(role){
  try{
    const key  = getLockoutKey(role);
    const data = JSON.parse(localStorage.getItem(key) || '{"attempts":0}');
    data.attempts = (data.attempts||0) + 1;
    if(data.attempts >= LOGIN_MAX_ATTEMPTS) data.lockedAt = Date.now();
    localStorage.setItem(key, JSON.stringify(data));
    return data.attempts;
  }catch(e){ return 0; }
}

function clearLockout(role){
  try{ localStorage.removeItem(getLockoutKey(role)); }catch(e){}
}

async function doLogin(){
  const id   = document.getElementById('lid').value.trim();
  const pw   = document.getElementById('lpw').value;
  const role = S.loginRole;

  if(!id || !pw) return toast('আইডি ও পাসওয়ার্ড দিন','err');

  // ── Input length সীমা ──
  if(id.length > 50 || pw.length > 100) return toast('ইনপুট অনেক বড়','err');

  // ── Lockout চেক ──
  const lock = checkLockout(role);
  if(lock.locked){
    return toast(`অনেকবার ভুল চেষ্টা। ${lock.remaining} মিনিট পর আবার চেষ্টা করুন।`,'err');
  }

  showL(true);
  try{
    const r = await FB.login(id,pw,role);
    showL(false);
    if(r.success){
      clearLockout(role); // সফল লগইনে lockout reset
      toast('সফল লগইন!');
      if(r.role==='admin'){
        try{
          // ✅ password ছাড়াই session save
          localStorage.setItem('somiti_session', JSON.stringify({role:'admin',user:{name:r.name},ts:Date.now()}));
          // ❌ somiti_offline_creds এ password আর সেভ হবে না
        }catch(e){}
        nav('adminDash',{role:'admin',user:{name:r.name},history:[]});
      } else {
        try{
          // ✅ password ছাড়াই session save (member object থেকে password বাদ)
          const safeUser = {...r.member};
          delete safeUser.password;
          localStorage.setItem('somiti_session', JSON.stringify({role:'member',user:safeUser,ts:Date.now()}));
        }catch(e){}
        nav('memberDash',{role:'member',user:r.member,history:[]});
        setTimeout(showPushOnLogin, 600);
      }
    } else {
      // ── ভুল পাসওয়ার্ড → attempt record ──
      const attempts  = recordFailedAttempt(role);
      const remaining = LOGIN_MAX_ATTEMPTS - attempts;
      if(remaining > 0){
        toast(`${r.message} (আরো ${remaining} বার সুযোগ আছে)`,'err');
      } else {
        toast('অনেকবার ভুল চেষ্টা। ৩০ মিনিট লক হয়েছে।','err');
      }
    }
  }catch(e){
    showL(false);
    // Offline fallback — session থেকে role check (password নেই)
    try{
      const sess = JSON.parse(localStorage.getItem('somiti_session')||'null');
      if(sess && sess.role === role){
        toast('অফলাইন মোডে লগইন (সীমিত ডেটা)','ok');
        if(sess.role==='admin'){
          nav('adminDash',{role:'admin',user:sess.user,history:[]});
        } else {
          nav('memberDash',{role:'member',user:sess.user,history:[]});
          setTimeout(showPushOnLogin, 600);
        }
      } else {
        toast('অফলাইন — আগে অনলাইনে একবার লগইন করুন','err');
      }
    }catch(ex){ toast('ত্রুটি: '+e.message,'err'); }
  }
}

/* ━━━ PDF RECEIPT (Admin: one-click download) ━━━ */
// Try to fetch an image and convert to data URL so html2canvas can render it
// without tainting the canvas. Falls back through a CORS proxy.
async function _imgToDataURL(url){
  if(!url) return '';
  const id = (typeof driveId==='function') ? driveId(url) : '';
  const candidates = [];
  if(id){
    candidates.push(`https://lh3.googleusercontent.com/d/${id}=w400-h400`);
    candidates.push(`https://drive.google.com/thumbnail?id=${id}&sz=w400`);
  }
  candidates.push(url);
  // CORS proxy fallbacks
  const proxied = candidates.map(u=>`https://corsproxy.io/?${encodeURIComponent(u)}`);
  candidates.push(...proxied);
  for(const u of candidates){
    try{
      const res = await fetch(u, {mode:'cors', cache:'no-store'});
      if(!res.ok) continue;
      const blob = await res.blob();
      if(!blob || !blob.size) continue;
      const dataUrl = await new Promise((resolve,reject)=>{
        const fr = new FileReader();
        fr.onload = ()=>resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(blob);
      });
      if(dataUrl && dataUrl.startsWith('data:image')) return dataUrl;
    }catch(e){ /* try next */ }
  }
  return '';
}

async function downloadTxReceipt(key, btnEl){
  const t = (window._txMap||{})[key];
  if(!t){ toast('লেনদেন পাওয়া যায়নি','err'); return; }
  if(!window.jspdf || !window.html2canvas){ toast('PDF লাইব্রেরি লোড হচ্ছে...','err'); return; }
  const origHTML = btnEl ? btnEl.innerHTML : '';
  if(btnEl){ btnEl.disabled = true; btnEl.innerHTML = '⏳'; }
  try{
    // Resolve member (if any)
    let member = {name:'-', id:'-', mobile:'', email:''};
    if(t.memberId){
      const cached = (S.cache.members||[]).find(x=>String(x.id)===String(t.memberId));
      if(cached) member = cached;
      else {
        try{
          const ms = await FB.list('members','_id');
          S.cache.members = ms;
          const f = ms.find(x=>String(x.id)===String(t.memberId));
          if(f) member = f;
        }catch(e){}
      }
    }
    // Compute balances (best-effort, only for member transactions)
    let depBal=0, loanOutstanding=0, outstandingBokaya=0;
    if(t.memberId){
      try{
        const allFees = await FB.list('fees');
        const feeBal = calcFeeBalance(allFees.filter(f=>String(f.memberId)===String(member.id)));
        depBal = feeBal.netJama; outstandingBokaya = feeBal.bokaya;
      }catch(e){}
      try{
        const allLoans = await FB.list('loans');
        allLoans.filter(l=>String(l.memberId)===String(member.id)).forEach(l=>{
          const a=+l.amount||0;
          if(l.type==='প্রদান') loanOutstanding+=a;
          else if(l.type==='ফেরত') loanOutstanding-=a;
        });
      }catch(e){}
    }
    // Preload logo as data URL so it actually renders in the PDF
    let logoDataUrl = '';
    try{ logoDataUrl = await _imgToDataURL(S.settings?.logo||''); }catch(e){}
    const html = buildReceiptHTML(t, member, {depBal, loanOutstanding, outstandingBokaya, logoDataUrl});
    // Render offscreen
    const host = document.createElement('div');
    host.style.cssText = 'position:fixed;left:-10000px;top:0;width:780px;background:#fff;z-index:-1';
    host.innerHTML = html;
    document.body.appendChild(host);
    // Wait for fonts/images
    try{ if(document.fonts && document.fonts.ready) await document.fonts.ready; }catch(e){}
    await new Promise(r=>setTimeout(r,150));
    const target = host.firstElementChild;
    const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false});
    document.body.removeChild(host);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'p', unit:'mm', format:'a4'});
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const imgW = pageW - margin*2;
    const imgH = canvas.height * imgW / canvas.width;
    const imgData = canvas.toDataURL('image/png');
    if(imgH <= pageH - margin*2){
      pdf.addImage(imgData, 'PNG', margin, margin, imgW, imgH, undefined, 'FAST');
    }else{
      // Multi-page
      let remaining = imgH; let pos = margin;
      pdf.addImage(imgData, 'PNG', margin, pos, imgW, imgH, undefined, 'FAST');
      remaining = imgH - (pageH - margin*2);
      while(remaining > 0){
        pdf.addPage();
        pos = margin - (imgH - remaining);
        pdf.addImage(imgData, 'PNG', margin, pos, imgW, imgH, undefined, 'FAST');
        remaining -= (pageH - margin*2);
      }
    }
    const safeName = (member.name||'receipt').replace(/[^\u0980-\u09FFa-zA-Z0-9_-]+/g,'_').slice(0,30);
    const fname = `Receipt_${safeName}_${t.date||today()}.pdf`;
    pdf.save(fname);
    toast('রশিদ ডাউনলোড সম্পন্ন ✓','ok');
  }catch(e){
    console.error(e);
    toast('PDF তৈরি ব্যর্থ হয়েছে','err');
  }finally{
    if(btnEl){ btnEl.disabled=false; btnEl.innerHTML = origHTML || '📄'; }
  }
}

// Bengali number-to-words (best-effort, supports up to crore range)
function numToBengaliWords(n){
  n = Math.abs(Math.floor(+n||0));
  if(n===0) return 'শূন্য';
  const ones=['','এক','দুই','তিন','চার','পাঁচ','ছয়','সাত','আট','নয়','দশ','এগারো','বারো','তেরো','চৌদ্দ','পনেরো','ষোলো','সতেরো','আঠারো','ঊনিশ'];
  const tens=['','','বিশ','ত্রিশ','চল্লিশ','পঞ্চাশ','ষাট','সত্তর','আশি','নব্বই'];
  function below100(x){
    if(x<20) return ones[x];
    return tens[Math.floor(x/10)] + (x%10?' '+ones[x%10]:'');
  }
  function below1000(x){
    let s='';
    if(x>=100){ s += ones[Math.floor(x/100)]+'শত'; x%=100; if(x) s+=' '; }
    if(x) s += below100(x);
    return s;
  }
  let parts=[];
  const crore=Math.floor(n/10000000); n%=10000000;
  const lakh=Math.floor(n/100000); n%=100000;
  const thousand=Math.floor(n/1000); n%=1000;
  const rest=n;
  if(crore) parts.push(below1000(crore)+' কোটি');
  if(lakh) parts.push(below1000(lakh)+' লক্ষ');
  if(thousand) parts.push(below1000(thousand)+' হাজার');
  if(rest) parts.push(below1000(rest));
  return parts.join(' ');
}

/* ━━━ PAGINATION (10/page) ━━━ */
function pageOf(arr, key, per){
  per = per||10;
  const total = Math.max(1, Math.ceil(arr.length/per));
  S.pages = S.pages||{};
  let p = parseInt(S.pages[key])||1;
  if(p>total) p=total; if(p<1) p=1;
  S.pages[key]=p;
  const start=(p-1)*per;
  return {slice: arr.slice(start, start+per), p, total, per, totalItems: arr.length, start};
}
function pagerHTML(key, p, total){
  if(total<=1) return '';
  const btn = (n,lbl,dis,act)=>`<button onclick="setPage('${key}',${n})" ${dis?'disabled':''} style="min-width:34px;height:32px;padding:0 9px;border-radius:8px;border:1px solid ${act?'var(--p)':'#dde'};background:${act?'var(--p)':'#fff'};color:${act?'#fff':'#234'};font-weight:600;cursor:${dis?'not-allowed':'pointer'};opacity:${dis?.4:1};font-size:13px">${lbl}</button>`;
  let nums='';
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-p)<=1) nums += btn(i,i,false,i===p);
    else if(i===2&&p>3){ nums += '<span style="padding:0 4px;color:#888">…</span>'; }
    else if(i===total-1&&p<total-2){ nums += '<span style="padding:0 4px;color:#888">…</span>'; }
  }
  return `<div style="display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap;padding:14px 10px;border-top:1px solid var(--bdr)">
    ${btn(p-1,'‹ পূর্ববর্তী',p===1)} ${nums} ${btn(p+1,'পরবর্তী ›',p===total)}
    <div style="width:100%;text-align:center;font-size:12px;color:#666;margin-top:4px">পেইজ ${p} / ${total}</div>
  </div>`;
}
function setPage(key, n){
  S.pages = S.pages||{};
  S.pages[key] = n;
  render();
  setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),50);
}

/* Google Drive link → direct image preview */
function drivePreview(url){
  if(!url) return '';
  const m = url.match(/\/d\/([^/]+)/) || url.match(/[?&]id=([^&]+)/);
  const id = m ? m[1] : null;
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : url;
}
function updPrev(inputId, imgId, linkId){
  const v = document.getElementById(inputId).value.trim();
  const img = document.getElementById(imgId);
  const lnk = document.getElementById(linkId);
  if(v){
    img.src = drivePreview(v);
    img.style.display='block';
    lnk.href = v; lnk.textContent = v; lnk.style.display='inline';
  } else {
    img.style.display='none'; lnk.style.display='none';
  }
}

/* ━━━ MEMBER FINANCIAL TRACKER ━━━ */
async function pgMonthlyTracker(){
  showL(true);
  let members=[], allFees=[], allLoans=[];
  try{
    [members, allFees, allLoans] = await Promise.all([
      FB.list('members','name').catch(()=>[]),
      FB.list('fees').catch(()=>[]),
      FB.list('loans').catch(()=>[])
    ]);
  }catch(e){}
  showL(false);

  const feeGroups = {};
  allFees.forEach(f=>{
    const mid = String(f.memberId||'');
    if(mid) (feeGroups[mid] ||= []).push(f);
  });

  // প্রতি সদস্যের হিসাব তৈরি
  const data = {};
  members.forEach(m=>{
    const bal = calcFeeBalance(feeGroups[String(m.id||'')] || []);
    data[String(m.id||'')] = {
      mem: m,
      jama: bal.jama,       // মোট জমা
      bokaya: bal.bokaya,   // পরিশোধ বাদে বর্তমান বকেয়া
      uttolan: bal.uttolan, // উত্তোলন
      loanGiven: 0, // প্রদত্ত ঋণ
      loanReturn: 0,// ফেরত ঋণ
      feeTxs: feeGroups[String(m.id||'')] || [],
      loanTxs: []
    };
  });

  allLoans.forEach(l=>{
    const mid = String(l.memberId||'');
    if(!data[mid]) return;
    const a = +l.amount||0;
    if(l.type==='প্রদান') data[mid].loanGiven  += a;
    else                   data[mid].loanReturn += a;
    data[mid].loanTxs.push(l);
  });

  // সারসংক্ষেপ
  let totJama=0, totBokaya=0, totLoan=0, membersWithLoan=0;
  Object.values(data).forEach(d=>{
    totJama   += d.jama - d.uttolan;
    totBokaya += d.bokaya;
    const lo = d.loanGiven - d.loanReturn;
    if(lo>0){ totLoan += lo; membersWithLoan++; }
  });

  // ফিল্টার + সার্চ
  const q = (S.mftSearch||'').trim().toLowerCase();
  const sortBy = S.mftSort || 'name'; // name | jama | bokaya | loan
  const filterType = S.mftFilter || 'all'; // all | hasBokaya | hasLoan | clean

  let rows = Object.values(data);
  if(q) rows = rows.filter(d=>(d.mem.name||'').toLowerCase().includes(q)||(d.mem.id||'').toLowerCase().includes(q));
  if(filterType==='hasBokaya') rows = rows.filter(d=>d.bokaya>0);
  if(filterType==='hasLoan')   rows = rows.filter(d=>d.loanGiven-d.loanReturn>0);
  if(filterType==='clean')     rows = rows.filter(d=>d.bokaya===0 && d.loanGiven-d.loanReturn<=0);

  rows.sort((a,b)=>{
    if(sortBy==='jama')   return (b.jama-b.uttolan) - (a.jama-a.uttolan);
    if(sortBy==='bokaya') return b.bokaya - a.bokaya;
    if(sortBy==='loan')   return (b.loanGiven-b.loanReturn) - (a.loanGiven-a.loanReturn);
    return (a.mem.name||'').localeCompare(b.mem.name||'');
  });

  // প্রতিটি কার্ড রেন্ডার
  const cards = rows.map(d=>{
    const curJama  = d.jama - d.uttolan;
    const loanOut  = d.loanGiven - d.loanReturn;
    const hasIssue = d.bokaya>0 || loanOut>0;
    const isClean  = !hasIssue;
    const badge = isClean
      ? `<span class="mft-badge ok">✓ পরিষ্কার</span>`
      : (d.bokaya>0 && loanOut>0)
        ? `<span class="mft-badge bad">বকেয়া + ঋণ</span>`
        : d.bokaya>0
          ? `<span class="mft-badge warn">বকেয়া আছে</span>`
          : `<span class="mft-badge bad">ঋণ আছে</span>`;

    // জমার অগ্রগতি বার — বকেয়ার বিপরীতে
    const maxAmt = Math.max(curJama, d.bokaya, 1);
    const jamaW  = Math.round(curJama/maxAmt*100);
    const bokayaW= Math.round(d.bokaya/maxAmt*100);

    return `<div class="mft-card" onclick="openMftDetail('${esc(String(d.mem.id||''))}')">
      <div class="mft-card-hd">
        <div class="mft-av">${esc((d.mem.name||'?')[0].toUpperCase())}</div>
        <div style="flex:1;min-width:0">
          <div class="mft-name">${esc(d.mem.name||'-')}</div>
          <div class="mft-id">আইডি: ${esc(d.mem.id||'-')} ${d.mem.mobile?'• 📱 '+esc(d.mem.mobile):''}</div>
        </div>
        <div class="mft-status">${badge}</div>
      </div>
      <div class="mft-card-bd">
        <div class="mft-row">
          <span class="lbl">💰 বর্তমান জমা</span>
          <span class="val g">${fmt(curJama)}</span>
        </div>
        <div class="mft-row">
          <span class="lbl">⚠️ বকেয়া</span>
          <span class="val ${d.bokaya>0?'r':'g'}">${d.bokaya>0?fmt(d.bokaya):'নেই'}</span>
        </div>
        <div class="mft-row">
          <span class="lbl">🤝 ঋণ (চলমান)</span>
          <span class="val ${loanOut>0?'r':'g'}">${loanOut>0?fmt(loanOut):'নেই'}</span>
        </div>
        ${d.uttolan>0?`<div class="mft-row"><span class="lbl">📤 উত্তোলন</span><span class="val b">${fmt(d.uttolan)}</span></div>`:''}
        <div class="mft-bar-wrap">
          <div class="mft-bar-fill" style="width:${jamaW}%;background:${isClean?'var(--ok)':d.bokaya>0?'var(--warn)':'var(--ok)'}"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // ডেটা উইন্ডোতে সেভ করি detail modal এর জন্য
  window._mftData = data;

  const fBtns = [
    ['all','সকল'],['hasBokaya','বকেয়া আছে'],['hasLoan','ঋণ আছে'],['clean','পরিষ্কার']
  ].map(([v,l])=>`<button class="mft-sort-btn ${filterType===v?'on':''}" onclick="S.mftFilter='${v}';render()">${l}</button>`).join('');

  const sBtns = [
    ['name','নাম'],['jama','জমা'],['bokaya','বকেয়া'],['loan','ঋণ']
  ].map(([v,l])=>`<button class="mft-sort-btn ${sortBy===v?'on':''}" onclick="S.mftSort='${v}';render()">${l} ↕</button>`).join('');

  return `<div class="main">
    <div class="dl-bar">
      <div class="pg-title" style="margin:0">📊 সদস্য আর্থিক ট্র্যাকার</div>
      <button class="dl-btn dl-pdf" onclick="showDlModal('monthlyTracker')">⬇️ ডাউনলোড</button>
    </div>

    <!-- সারসংক্ষেপ কার্ড -->
    <div class="mft-summary-bar">
      <div class="mft-scard"><div class="v">${members.length}</div><div class="l">মোট সদস্য</div></div>
      <div class="mft-scard g"><div class="v">${fmt(totJama)}</div><div class="l">মোট নীট জমা</div></div>
      <div class="mft-scard r"><div class="v">${fmt(totBokaya)}</div><div class="l">মোট বকেয়া</div></div>
      <div class="mft-scard o"><div class="v">${fmt(totLoan)}</div><div class="l">চলমান ঋণ (${membersWithLoan}জন)</div></div>
    </div>

    <!-- ফিল্টার -->
    <div class="card" style="padding:13px 14px;margin-bottom:13px">
      <div class="mft-filter">
        <input placeholder="🔍 নাম বা আইডি দিয়ে খুঁজুন..." value="${esc(S.mftSearch||'')}" oninput="S.mftSearch=this.value;render()">
      </div>
      <div style="font-size:11px;color:var(--t2);font-weight:600;margin-bottom:6px">ফিল্টার</div>
      <div class="mft-sort-bar">${fBtns}</div>
      <div style="font-size:11px;color:var(--t2);font-weight:600;margin-bottom:6px;margin-top:10px">সাজানো</div>
      <div class="mft-sort-bar">${sBtns}</div>
    </div>

    <!-- রেজাল্ট কাউন্ট -->
    <div style="font-size:12.5px;color:var(--t2);font-weight:600;margin:0 2px 10px;display:flex;align-items:center;justify-content:space-between">
      <span>${rows.length} জন সদস্য দেখাচ্ছে</span>
      ${rows.length!==members.length?`<button class="mft-sort-btn" onclick="S.mftSearch='';S.mftFilter='all';render()">✕ ফিল্টার মুছুন</button>`:''}
    </div>

    <!-- কার্ড গ্রিড -->
    ${rows.length===0
      ? `<div class="card"><div class="mft-empty">😔 কোনো সদস্য পাওয়া যায়নি</div></div>`
      : `<div class="mft-grid">${cards}</div>`
    }
  </div>`;
}

function openMftDetail(id){
  const d = window._mftData?.[String(id)];
  if(!d) return;
  const mem = d.mem;
  const curJama = d.jama - d.uttolan;
  const loanOut = d.loanGiven - d.loanReturn;

  // সব লেনদেন একসাথে, তারিখ অনুযায়ী সাজানো
  const allTxs = [
    ...d.feeTxs.map(f=>({
      date: f.date || (f.timestamp?.toDate ? f.timestamp.toDate().toISOString().slice(0,10) : ''),
      type: f.type, amount: +f.amount||0, note: f.note||'', cat: 'fee', _orig: f
    })),
    ...d.loanTxs.map(l=>({
      date: l.date || (l.timestamp?.toDate ? l.timestamp.toDate().toISOString().slice(0,10) : ''),
      type: l.type==='প্রদান'?'ঋণ প্রদান':'ঋণ ফেরত', amount: +l.amount||0, note: l.note||'', cat: 'loan', _orig: l, _origType: l.type
    }))
  ].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const typeIcon = t=>({
    'জমা':'💰','বকেয়া':'⚠️','উত্তোলন':'📤','ঋণ প্রদান':'🤝','ঋণ ফেরত':'✅'
  }[t]||'📋');
  const typeClass = t=>['জমা','ঋণ ফেরত'].includes(t)?'in':['উত্তোলন','ঋণ প্রদান'].includes(t)?'out':'loan';
  const typeColor = t=>['জমা','ঋণ ফেরত'].includes(t)?'var(--ok)':['উত্তোলন','ঋণ প্রদান'].includes(t)?'var(--danger)':'var(--warn)';

  document.getElementById('mftDetailBg')?.remove();
  const div = document.createElement('div');
  div.id = 'mftDetailBg';
  div.className = 'mft-detail-bg';
  div.innerHTML = `<div class="mft-detail" onclick="event.stopPropagation()">
    <div class="mft-detail-hd">
      <div class="mft-av" style="width:46px;height:46px;font-size:19px">${esc((mem.name||'?')[0].toUpperCase())}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:16px">${esc(mem.name||'-')}</div>
        <div style="font-size:12px;color:var(--t3)">আইডি: ${esc(mem.id||'-')}${mem.mobile?' • '+esc(mem.mobile):''}</div>
      </div>
      <button onclick="document.getElementById('mftDetailBg').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:4px;line-height:1">✕</button>
    </div>
    <div class="mft-detail-bd">
      <!-- আর্থিক সারসংক্ষেপ -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="background:#f0fff4;border-radius:12px;padding:10px;text-align:center">
          <div style="font-size:15px;font-weight:800;color:var(--ok)">${fmt(curJama)}</div>
          <div style="font-size:10px;color:var(--t2);margin-top:2px">বর্তমান জমা</div>
        </div>
        <div style="background:${d.bokaya>0?'#fff5f5':'#f0fff4'};border-radius:12px;padding:10px;text-align:center">
          <div style="font-size:15px;font-weight:800;color:${d.bokaya>0?'var(--danger)':'var(--ok)'}">${d.bokaya>0?fmt(d.bokaya):'নেই'}</div>
          <div style="font-size:10px;color:var(--t2);margin-top:2px">বকেয়া</div>
        </div>
        <div style="background:${loanOut>0?'#fff7ed':'#f0fff4'};border-radius:12px;padding:10px;text-align:center">
          <div style="font-size:15px;font-weight:800;color:${loanOut>0?'var(--warn)':'var(--ok)'}">${loanOut>0?fmt(loanOut):'নেই'}</div>
          <div style="font-size:10px;color:var(--t2);margin-top:2px">চলমান ঋণ</div>
        </div>
      </div>
      ${d.uttolan>0?`<div style="background:#eff6ff;border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--pd);font-weight:600;margin-bottom:12px">📤 মোট উত্তোলন: ${fmt(d.uttolan)}</div>`:''}

      <!-- লেনদেনের ইতিহাস -->
      <div style="font-weight:700;font-size:13.5px;margin-bottom:10px;color:var(--t1)">📋 লেনদেনের ইতিহাস (${allTxs.length}টি)</div>
      ${allTxs.length===0
        ? `<div class="mft-empty">কোনো লেনদেন নেই</div>`
        : allTxs.map(tx=>{
            window._txMap = window._txMap || {};
            const _o = tx._orig || {};
            const _pkey = (_o._id||'')+'_'+(_o.timestamp?.seconds||Math.random().toString(36).slice(2,8));
            window._txMap[_pkey] = {..._o, type: tx._origType||_o.type||tx.type, memberId: _o.memberId||mem.id};
            const _pdf = (S.role==='admin') ? `<button class="tx-pdf-btn" style="width:30px;height:30px;font-size:13px;margin-left:6px" title="রশিদ PDF" onclick="event.stopPropagation();downloadTxReceipt('${_pkey}',this)">📄</button>` : '';
            return `<div class="mft-tx-row">
            <div class="mft-tx-ic ${typeClass(tx.type)}">${typeIcon(tx.type)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;color:var(--t1)">${esc(tx.type)}</div>
              <div style="font-size:11px;color:var(--t3)">${tx.date||'তারিখ নেই'}${tx.note?' • '+esc(tx.note):''}</div>
            </div>
            <div style="font-weight:800;font-size:14px;color:${typeColor(tx.type)}">${['উত্তোলন','ঋণ প্রদান','বকেয়া'].includes(tx.type)?'-':'+'}${fmt(tx.amount)}</div>
            ${_pdf}
          </div>`;}).join('')
      }
    </div>
  </div>`;
  document.body.appendChild(div);
  requestAnimationFrame(()=>div.classList.add('on'));
  div.onclick = ()=>{ div.classList.remove('on'); setTimeout(()=>div.remove(),280); };
}

async function sendTrxEmail(member, trx, category){
  try{
    const st = S.settings||{};
    const ej = st.emailjs || {};
    if(st.emailNotify === false) return; // Admin disabled notifications
    const email = (member?.email||'').trim();
    if(!email || !email.includes('@')) return;
    if(!ej.serviceId || !ej.templateId || !ej.publicKey || !window.emailjs) return;

    category = category || 'fee'; // 'fee' | 'loan'
    const typeLabel = trx.type || '';

    // Compute balances
    let depBal = 0, loanOutstanding = 0, outstandingBokaya = 0;
    try{
      const allFees = await FB.list('fees');
      const feeBal = calcFeeBalance(allFees.filter(f=>String(f.memberId)===String(member.id)));
      depBal = feeBal.netJama;
      outstandingBokaya = feeBal.bokaya;
    }catch(e){}
    try{
      const allLoans = await FB.list('loans');
      allLoans.filter(l=>String(l.memberId)===String(member.id)).forEach(l=>{
        const a = +l.amount||0;
        if(l.type==='প্রদান') loanOutstanding += a;
        else if(l.type==='ফেরত') loanOutstanding -= a;
      });
    }catch(e){}
    // Color/label scheme per transaction type
    let accent='#0D47A1', accentSoft='#eff6ff', icon='💳', sign='', flowText='';
    if(typeLabel==='জমা'){ accent='#047857'; accentSoft='#ecfdf5'; icon='⬇'; sign='+'; flowText='ক্রেডিট (জমা)'; }
    else if(typeLabel==='উত্তোলন'){ accent='#b91c1c'; accentSoft='#fef2f2'; icon='⬆'; sign='−'; flowText='ডেবিট (উত্তোলন)'; }
    else if(typeLabel==='বকেয়া'){ accent='#b45309'; accentSoft='#fffbeb'; icon='⏰'; sign=''; flowText='বকেয়া রেকর্ড'; }
    else if(typeLabel==='প্রদান'){ accent='#6d28d9'; accentSoft='#f5f3ff'; icon='🤝'; sign='+'; flowText='ঋণ প্রদান'; }
    else if(typeLabel==='ফেরত'){ accent='#0e7490'; accentSoft='#ecfeff'; icon='↩'; sign='−'; flowText='ঋণ ফেরত'; }

    // Bokaya status for fee receipts (বকেয়া / জমা / উত্তোলন)
    const isFeeType = ['বকেয়া','জমা','উত্তোলন'].includes(typeLabel) && category!=='loan';
    const bokayaLineLabel = typeLabel==='বকেয়া' ? 'বর্তমান মোট বকেয়া' : (typeLabel==='জমা' ? 'আদায়ের পর অবশিষ্ট বকেয়া' : 'বর্তমান বকেয়া');

    const subject = `${st.name||'সমিতি'} | ${typeLabel} লেনদেন রসিদ — ${fmt(trx.amount)}৳`;
    const bokayaMsgLine = isFeeType ? `\n${bokayaLineLabel}: ${fmt(outstandingBokaya)} ৳` : '';
    const msg = `প্রিয় ${member.name||'সদস্য'},\n\nআপনার অ্যাকাউন্টে একটি ${typeLabel} লেনদেন সম্পন্ন হয়েছে।\nপরিমাণ: ${fmt(trx.amount)} ৳\nতারিখ: ${trx.date||today()}\nজমা ব্যালেন্স: ${fmt(depBal)} ৳${bokayaMsgLine}\nঋণ বকেয়া: ${fmt(loanOutstanding)} ৳\n\n${st.name||'সমিতি'} কর্তৃপক্ষ`;

    const trxId = 'TXN' + Date.now().toString().slice(-10);
    const timestamp = new Date().toLocaleString('bn-BD');
    // Email-safe logo URL: Gmail blocks drive.google.com/thumbnail but renders lh3.googleusercontent.com
    let logoUrl = '';
    if(st.logo){
      const _id = (typeof driveId==='function') ? driveId(st.logo) : '';
      logoUrl = _id ? `https://lh3.googleusercontent.com/d/${_id}=w200-h200` : st.logo;
    }

    const htmlMsg = `<div style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Hind Siliguri',Arial,sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased">

async function saveFee(){
  if(!S.feeMember) return toast('সদস্য নির্বাচন করুন','err');
  const d = {
    memberId: S.feeMember.id,
    memberName: S.feeMember.name||'',
    type: document.getElementById('f_type').value,
    amount: +document.getElementById('f_amt').value,
    date: document.getElementById('f_date').value,
    note: document.getElementById('f_note').value.trim()
  };
  if(!d.amount) return toast('পরিমাণ আবশ্যক','err');
  showL(true);
  try{
    const isNew = !(S.editingTx && S.editingTx._id);
    let newFeeId = null;
    if(!isNew){
      await FB.setDoc('fees', S.editingTx._id, d);
      toast('আপডেট হয়েছে');
    } else {
      newFeeId = await FB.add('fees', d);
      toast('সফল!');
    }

    // ━━ বকেয়া স্বয়ংক্রিয় সমন্বয় ━━
    // নতুন 'জমা' এন্ট্রি হলে আগের বকেয়া থেকে বাদ দিতে নেগেটিভ-বকেয়া অফসেট যোগ করি
    let adjInfo = null;
    if(isNew && d.type==='জমা'){
      try{
        const allF = await FB.listWhere('fees','memberId',d.memberId);
        const curBokaya = calcFeeBalance(allF.filter(f=>String(f._id)!==String(newFeeId))).bokaya;
        if(curBokaya > 0){
          const cut = Math.min(curBokaya, d.amount);
          const remaining = curBokaya - cut;
          await FB.add('fees', {
            memberId: d.memberId,
            memberName: d.memberName,
            type: 'বকেয়া',
            amount: -cut,
            date: d.date,
            note: 'জমা থেকে বকেয়া সমন্বয় (অটো)'
          });
          adjInfo = { cut, remaining, prev: curBokaya };
        }
      }catch(e){ console.warn('bokaya adjust failed', e); }
    }

    // Send email notification to member (non-blocking on failure)
    sendTrxEmail(S.feeMember, d).then(()=>{
      if((S.feeMember?.email||'').includes('@')) toast('সদস্যের ইমেইলে নোটিফিকেশন পাঠানো হয়েছে');
    });
    S.editingTx=null;
    showL(false);
    render();

    if(adjInfo){
      setTimeout(()=>showBokayaAdjustModal(S.feeMember?.name||'', d.amount, adjInfo), 250);
    }
  }catch(e){showL(false);toast(e.message,'err')}
}

function renderLnSearch(){

  const box = document.getElementById('lnResults');
  if(!box) return;
  if(!q){ box.innerHTML = `<div style="padding:6px;color:var(--muted);font-size:13px">নাম বা আইডি লিখে সদস্য বাছাই করুন...</div>`; return; }
  const matches = members.filter(m=>
    (m.name||'').toLowerCase().includes(q) || String(m.id||'').toLowerCase().includes(q)
  ).slice(0,8);
  if(matches.length===0){ box.innerHTML = `<div style="padding:10px;color:var(--muted);text-align:center">কোনো সদস্য পাওয়া যায়নি</div>`; return; }
